<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Protocol">
<meta name="theme-color" content="#141414">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='38' fill='%23141414'/%3E%3Ctext x='90' y='118' font-family='Georgia,serif' font-size='80' font-weight='700' fill='%23D4A96A' text-anchor='middle'%3EBJ%3C/text%3E%3C/svg%3E">
<title>Emil's Protocol</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;1,300&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:#141414; --bg2:#1C1C1C; --bg3:#2A2A2A;
  --border:#2E2E2E; --bord2:#3A3A3A;
  --text:#E8E4DC; --text2:#A09A90; --text3:#5C5650;
  --c:#D4A96A;
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
}

html, body {
  height: 100%; height: 100dvh;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'Instrument Sans', sans-serif;
  -webkit-text-size-adjust: 100%;
  -webkit-tap-highlight-color: transparent;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
}

.topbar {
  flex-shrink: 0;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding-top: calc(var(--sat) + 14px);
  padding-bottom: 14px;
  padding-left: 20px;
  padding-right: 20px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 12px;
}

.topbar-left { min-width: 0; }

.app-eyebrow {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 2px;
}

.topbar-title {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.5px;
  line-height: 1.1;
  color: var(--c);
  transition: color .25s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.topbar-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  flex-shrink: 0;
}

.pill {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: 20px;
  border: 1px solid;
  white-space: nowrap;
}

.scroll-area {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
}

.content {
  padding: 20px 16px 28px;
  animation: fadeUp .2s ease both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}

.hero {
  margin-bottom: 20px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.day-name {
  font-family: 'Fraunces', serif;
  font-size: 40px;
  font-weight: 600;
  letter-spacing: -1.5px;
  line-height: 1;
  color: var(--c);
  transition: color .25s;
}

.day-theme {
  font-size: 15px;
  color: var(--text2);
  margin-top: 5px;
  font-weight: 500;
}

.source-tag {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 6px 12px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 7px;
  font-size: 11px;
  color: var(--text2);
  margin-top: 12px;
}
.source-tag b {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--c);
  transition: color .25s;
}

.adapt {
  display: flex;
  gap: 12px;
  padding: 14px 15px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 22px;
}
.adapt-icon { font-size: 17px; flex-shrink: 0; margin-top: 1px; }
.adapt-lbl  { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--c); margin-bottom: 4px; transition: color .25s; }
.adapt-txt  { font-size: 12px; color: var(--text2); line-height: 1.65; }

.phase { margin-bottom: 20px; }

.phase-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.phase-num {
  width: 24px; height: 24px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700;
  flex-shrink: 0; color: #141414;
  transition: background .25s;
}
.phase-title { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
.phase-dur   { font-size: 11px; color: var(--text3); font-weight: 500; }

.ex-table {
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  background: var(--bg2);
}

.ex-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  padding: 13px 15px;
  border-bottom: 1px solid var(--border);
  transition: background .1s;
  min-height: 44px;
}
.ex-row:last-child { border-bottom: none; }
.ex-row:active { background: var(--bg3); }

.ex-body  { flex: 1; min-width: 0; }
.ex-name  { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; line-height: 1.3; }
.ex-desc  { font-size: 11px; color: var(--text2); line-height: 1.55; }
.ex-sets  {
  font-size: 10px; font-weight: 700; color: var(--c);
  white-space: nowrap; padding: 3px 9px; border-radius: 6px;
  background: var(--bg3); border: 1px solid var(--bord2);
  flex-shrink: 0; margin-top: 2px; transition: color .25s;
}

/* ── HIIT GENERATOR ── */
.hiit-wrap { margin-bottom: 20px; }

.hiit-card {
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  background: var(--bg2);
}

.hiit-card-head {
  padding: 13px 15px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.hiit-badge {
  font-size: 8px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  padding: 3px 8px; border-radius: 4px;
}

.hiit-card-name {
  font-size: 14px; font-weight: 600; color: var(--text); flex: 1;
}

.hiit-goal-block {
  padding: 13px 15px;
  border-bottom: 1px solid var(--border);
}
.hiit-goal-lbl { font-size: 8px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text3); margin-bottom: 5px; }
.hiit-goal-txt { font-size: 12px; color: var(--text2); line-height: 1.6; }

.hiit-constraints {
  padding: 12px 15px;
  border-bottom: 1px solid var(--border);
  display: flex; flex-wrap: wrap; gap: 6px;
}

.constraint-chip {
  font-size: 10px; font-weight: 600; padding: 4px 10px;
  border-radius: 6px; border: 1px solid; white-space: nowrap;
  letter-spacing: 0.3px;
}

.gen-row {
  padding: 12px 15px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.gen-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 0 20px;
  height: 48px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-family: 'Instrument Sans', sans-serif;
  font-size: 13px; font-weight: 700;
  letter-spacing: 0.5px;
  transition: opacity .15s, transform .1s;
  flex-shrink: 0;
}
.gen-btn:active { opacity: .85; transform: scale(0.97); }

.gen-hint {
  font-size: 11px;
  color: var(--text3);
  font-style: italic;
  line-height: 1.4;
}

.wo-empty {
  padding: 28px 15px;
  text-align: center;
  color: var(--text3);
  font-size: 12px;
  font-style: italic;
}

.wo-out-header {
  padding: 13px 15px 11px;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}

.wo-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
.wo-tag  { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; border: 1px solid; }

.wo-title   { font-size: 17px; font-weight: 600; color: var(--text); line-height: 1.2; }
.wo-tagline { font-size: 12px; color: var(--text2); margin-top: 3px; font-style: italic; }

.wo-meta-pills { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 7px; }
.wo-meta-pill  { font-size: 9px; color: var(--text3); padding: 2px 7px; border-radius: 4px; background: var(--bg3); border: 1px solid var(--bord2); }

.wo-structure {
  padding: 13px 15px;
  border-bottom: 1px solid var(--border);
}
.wo-structure-lbl { font-size: 8px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text3); margin-bottom: 9px; }

.wo-moves { display: flex; flex-direction: column; gap: 5px; }
.wo-move-row {
  display: flex; align-items: flex-start; gap: 9px;
  padding: 9px 11px; border-radius: 8px; background: var(--bg3);
}
.wo-move-num  { font-size: 9px; font-weight: 700; color: var(--text3); flex-shrink: 0; min-width: 14px; padding-top: 2px; }
.wo-move-body { flex: 1; min-width: 0; }
.wo-move-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; }
.wo-move-desc { font-size: 11px; color: var(--text2); margin-top: 2px; line-height: 1.45; }
.wo-move-reps { font-size: 10px; font-weight: 700; white-space: nowrap; padding: 2px 8px; border-radius: 5px; flex-shrink: 0; margin-top: 2px; }

.wo-notes-block { padding: 13px 15px; }
.wo-notes-lbl { font-size: 8px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; }
.wo-note { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 7px; font-size: 12px; color: var(--text2); line-height: 1.55; }
.wo-note:last-child { margin-bottom: 0; }
.wo-note-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--c); flex-shrink: 0; margin-top: 5px; transition: background .25s; }

.purpose {
  border-radius: 12px; padding: 16px 17px; margin-top: 4px; border: 1px solid;
}
.purpose-lbl { font-size: 8px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 7px; }
.purpose-txt { font-family: 'Fraunces', serif; font-size: 14px; font-weight: 300; line-height: 1.75; font-style: italic; color: var(--text2); }

/* ── NOTES PAGE ── */
.notes-page { padding: 20px 16px 28px; }
.notes-page-title { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 300; color: var(--text); margin-bottom: 18px; letter-spacing: -0.3px; }
.p-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 15px 16px; margin-bottom: 10px; }
.p-title { font-size: 11px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: var(--text); margin-bottom: 5px; }
.p-body  { font-size: 12px; color: var(--text2); line-height: 1.7; }

/* ── TRACKER PAGE ── */
.tracker-page { padding: 16px 16px 28px; animation: fadeUp .2s ease both; }

.tracker-section { margin-bottom: 22px; }
.tracker-section-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.tracker-section-title {
  font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3);
}

.lift-cards { display: flex; flex-direction: column; gap: 8px; }

.lift-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

.lift-card-top {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 15px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.lift-card-top:active { background: var(--bg3); }

.lift-card-left { flex: 1; min-width: 0; }
.lift-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.lift-target { font-size: 11px; color: var(--text3); }

.lift-card-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.lift-pr {
  display: flex; flex-direction: column; align-items: flex-end;
}
.lift-pr-val {
  font-family: 'Fraunces', serif;
  font-size: 20px; font-weight: 600; line-height: 1;
  color: var(--c); transition: color .25s;
}
.lift-pr-lbl { font-size: 8px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); margin-top: 1px; }
.lift-expand-icon { font-size: 11px; color: var(--text3); transition: transform .2s; }
.lift-expand-icon.open { transform: rotate(180deg); }

.lift-history {
  border-top: 1px solid var(--border);
  display: none;
}
.lift-history.open { display: block; }

.lift-history-inner { padding: 12px 15px; }

.lift-log-form {
  display: flex; gap: 8px; margin-bottom: 12px; align-items: flex-end;
}
.lift-input-group { display: flex; flex-direction: column; gap: 4px; flex: 1; }
.lift-input-lbl { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); }
.lift-input {
  background: var(--bg3);
  border: 1px solid var(--bord2);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 14px; font-weight: 600;
  color: var(--text);
  font-family: 'Instrument Sans', sans-serif;
  width: 100%;
  -webkit-appearance: none;
}
.lift-input:focus { outline: none; border-color: var(--c); }

.lift-log-btn {
  background: var(--c);
  color: #141414;
  border: none;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 12px; font-weight: 700;
  font-family: 'Instrument Sans', sans-serif;
  cursor: pointer;
  transition: opacity .15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.lift-log-btn:active { opacity: .8; }

.lift-entries { display: flex; flex-direction: column; gap: 4px; }
.lift-entry {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 10px;
  background: var(--bg);
  border-radius: 7px;
  border: 1px solid var(--border);
}
.lift-entry-weight { font-size: 13px; font-weight: 700; color: var(--text); }
.lift-entry-reps { font-size: 11px; color: var(--text3); }
.lift-entry-date { font-size: 10px; color: var(--text3); }
.lift-entry-pr-badge {
  font-size: 8px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  padding: 2px 7px; border-radius: 4px;
  background: var(--c); color: #141414;
}
.lift-entry-del {
  background: none; border: none; cursor: pointer;
  font-size: 13px; color: var(--text3); padding: 2px 4px;
  opacity: 0.6;
}
.lift-entry-del:active { opacity: 1; }

.lift-no-history {
  font-size: 12px; color: var(--text3); font-style: italic;
  padding: 4px 0;
}

/* Session log */
.session-log-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

.session-form-inner { padding: 14px 15px; }

.session-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }

.session-input-group { display: flex; flex-direction: column; gap: 4px; }
.session-input-group.full { flex: 1 1 100%; }
.session-input-group.half { flex: 1 1 calc(50% - 4px); min-width: 100px; }
.session-input-group.third { flex: 1 1 calc(33% - 4px); min-width: 80px; }

.session-input {
  background: var(--bg3);
  border: 1px solid var(--bord2);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 13px; font-weight: 500;
  color: var(--text);
  font-family: 'Instrument Sans', sans-serif;
  width: 100%;
  -webkit-appearance: none;
}
.session-input:focus { outline: none; border-color: var(--c); }

.session-label { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); }

.session-save-btn {
  width: 100%;
  background: var(--c);
  color: #141414;
  border: none;
  border-radius: 10px;
  padding: 13px;
  font-size: 13px; font-weight: 700;
  font-family: 'Instrument Sans', sans-serif;
  cursor: pointer;
  transition: opacity .15s;
  margin-top: 4px;
}
.session-save-btn:active { opacity: .8; }

/* Session entries list */
.session-entries { padding: 0 15px 12px; }
.session-entry {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 11px 12px;
  background: var(--bg3);
  border-radius: 9px;
  margin-bottom: 6px;
  position: relative;
}
.session-entry-day {
  font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  color: var(--text3); flex-shrink: 0; width: 28px; padding-top: 2px;
}
.session-entry-body { flex: 1; min-width: 0; }
.session-entry-date { font-size: 11px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.session-entry-metrics { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 5px; }
.session-metric { font-size: 10px; color: var(--text2); padding: 2px 7px; background: var(--bg2); border-radius: 4px; border: 1px solid var(--border); }
.session-entry-notes { font-size: 11px; color: var(--text3); margin-top: 4px; font-style: italic; line-height: 1.45; }
.session-entry-del {
  background: none; border: none; cursor: pointer;
  font-size: 13px; color: var(--text3); padding: 2px;
  opacity: 0.5; flex-shrink: 0;
}
.session-entry-del:active { opacity: 1; }

/* Stats summary */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 14px;
}
.stat-val {
  font-family: 'Fraunces', serif;
  font-size: 26px; font-weight: 600; line-height: 1;
  color: var(--c); transition: color .25s;
}
.stat-lbl { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); margin-top: 4px; }
.stat-sub { font-size: 10px; color: var(--text2); margin-top: 2px; }

/* Tab + section selectors */
.tracker-tabs {
  display: flex; gap: 6px; margin-bottom: 18px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; padding-bottom: 2px;
}
.tracker-tabs::-webkit-scrollbar { display: none; }

.tracker-tab {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.5px;
  color: var(--text3);
  cursor: pointer;
  white-space: nowrap;
  transition: all .15s;
  font-family: 'Instrument Sans', sans-serif;
  -webkit-tap-highlight-color: transparent;
}
.tracker-tab.active {
  background: var(--c);
  color: #141414;
  border-color: var(--c);
}

.tracker-panel { display: none; }
.tracker-panel.active { display: block; }

/* Progress bar */
.progress-bar-wrap { margin-top: 6px; }
.progress-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.progress-bar-lbl { font-size: 10px; color: var(--text2); flex: 1; }
.progress-bar-val { font-size: 10px; font-weight: 700; color: var(--text); min-width: 40px; text-align: right; }
.progress-bar-bg { height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; flex: 1; }
.progress-bar-fill { height: 100%; border-radius: 3px; background: var(--c); transition: width .4s ease; }

/* BOTTOM TAB BAR */
.tab-bar {
  flex-shrink: 0;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: stretch;
  padding-bottom: var(--sab);
}

.tab-btn {
  flex: 1;
  background: transparent;
  border: none;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 10px 2px;
  color: var(--text3);
  transition: color .15s;
  min-height: 52px;
  position: relative;
  -webkit-tap-highlight-color: transparent;
}

.tab-btn.active { color: #141414; }

.tab-active-bg {
  position: absolute;
  inset: 6px 4px;
  border-radius: 8px;
  opacity: 0;
  transition: opacity .15s;
  pointer-events: none;
}

.tab-btn.active .tab-active-bg { opacity: 1; }

.tab-icon  { font-size: 17px; line-height: 1; position: relative; z-index: 1; }
.tab-label { font-size: 8px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; line-height: 1; position: relative; z-index: 1; }

@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

const DB = {
  get(key) {
    try { return JSON.parse(localStorage.getItem('ep_' + key) || 'null'); } catch { return null; }
  },
  set(key, val) {
    try { localStorage.setItem('ep_' + key, JSON.stringify(val)); } catch(e) { console.warn('Storage full', e); }

};

function showToast(msg) {
  const t = document.getElementById('toast');

  t.classList.add('show');

function getLiftEntries(liftId) {
  return DB.get('lift_' + liftId) || [];
}

function saveLiftEntry(liftId, weight, reps, note) {
  const entries = getLiftEntries(liftId);
  const entry = {
    id: Date.now(),
    weight: parseFloat(weight),
    reps: parseInt(reps) || 1,
    note: note || '',
    date: new Date().toISOString()
  };
  entries.unshift(entry);
  DB.set('lift_' + liftId, entries.slice(0, 60)); // keep last 60 entries
  return entry;
}

function deleteLiftEntry(liftId, entryId) {
  const entries = getLiftEntries(liftId).filter(e => e.id !== entryId);
  DB.set('lift_' + liftId, entries);
}

function getLiftPR(liftId) {
  const entries = getLiftEntries(liftId);
  if (!entries.length) return null;
  return Math.max(...entries.map(e => e.weight));
}

function getSessionLog() {
  return DB.get('sessions') || [];
}

function saveSession(session) {
  const sessions = getSessionLog();
  sessions.unshift({ id: Date.now(), ...session, date: new Date().toISOString() });
  DB.set('sessions', sessions.slice(0, 120));
}

function deleteSession(id) {
  const sessions = getSessionLog().filter(s => s.id !== id);
  DB.set('sessions', sessions);
}

function getWeeklyCount() {
  const sessions = getSessionLog();
  const now = new Date();
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - now.getDay() + 1); // Monday
  weekStart.setHours(0,0,0,0);
  return sessions.filter(s => new Date(s.date) >= weekStart).length;
}

function getTotalSessions() {
  return getSessionLog().length;
}

function phaseHtml(ph, idx, color) {
  const rows = ph.items.map(ex => `
    <div class="ex-row">
      <div class="ex-body">
        <div class="ex-name">${ex.n}</div>
        <div class="ex-desc">${ex.d}</div>
      </div>
      <div class="ex-sets" style="color:${color};">${ex.s}</div>
    </div>
  `).join('');
  return `
    <div class="phase">
      <div class="phase-head">
        <div class="phase-num" style="background:${color};">${idx}</div>
        <div class="phase-title">${ph.name}</div>
        <div class="phase-dur">${ph.dur}</div>
      </div>
      <div class="ex-table">${rows}</div>
    </div>
  `;
}

function hiitBlockHtml(d) {
  const col = d.color;
  const poolVar = d.hiitPool === 'UPPER' ? 'UPPER' : 'LOWER';
  const id = d.hiitPool.toLowerCase();
  const dur = d.hiitPool === 'UPPER' ? '25–30 min' : '22–27 min';
  const chips = d.constraints.map(c =>
    `<span class="constraint-chip" style="color:${col};border-color:${col}40;background:${col}10;">${c}</span>`
  ).join('');

  return `
    <div class="hiit-wrap">
      <div class="phase-head">
        <div class="phase-num" style="background:${col};">2</div>
        <div class="phase-title">HIIT — Your Choice</div>
        <div class="phase-dur">${dur}</div>
      </div>
      <div class="hiit-card" style="border-color:${col}35;">
        <div class="hiit-card-head" style="background:${col}10;">
          <span class="hiit-badge" style="background:${col}22;color:${col};">HIIT · ${d.hiitPool}</span>
          <span class="hiit-card-name">${d.hiitPool === 'UPPER' ? 'Upper Body Metabolic' : 'Lower Body + Posterior'}</span>
        </div>
        <div class="hiit-goal-block">
          <div class="hiit-goal-lbl">Goal</div>
          <div class="hiit-goal-txt">${d.hiitGoal}</div>
        </div>
        <div class="hiit-constraints">${chips}</div>
        <div class="gen-row">
          <button class="gen-btn" id="gbtn-${id}" style="background:${col};color:#141414;"
            onclick="genWorkout('${id}','${poolVar}','${col}')">
            <span id="gicon-${id}">⚡</span> Generate
          </button>
          <span class="gen-hint">Tap to get a random workout matching these constraints</span>
        </div>
        <div id="wo-out-${id}">
          <div class="wo-empty">Tap Generate to build your workout ↑</div>
        </div>
      </div>
    </div>
  `;
}

function genWorkout(id, poolName, color) {
  const pool = poolName === 'UPPER' ? UPPER : LOWER;
  const icon = document.getElementById('gicon-' + id);
  icon.classList.remove('spinning');
  void icon.offsetWidth;
  icon.classList.add('spinning');

  const w = pick(pool);
  const tagsHtml = w.tags.map(t =>
    `<span class="wo-tag" style="color:${color};border-color:${color}40;background:${color}12;">${t}</span>`
  ).join('');
  const movesHtml = w.moves.map((m, i) => `
    <div class="wo-move-row">
      <div class="wo-move-num">${String(i+1).padStart(2,'0')}</div>
      <div class="wo-move-body">
        <div class="wo-move-name">${m.name}</div>
        ${m.detail ? `<div class="wo-move-desc">${m.detail}</div>` : ''}
      </div>
      <span class="wo-move-reps" style="color:${color};background:${color}15;border:1px solid ${color}30;">${m.reps}</span>
    </div>
  `).join('');
  const notesHtml = w.notes.map(n => `
    <div class="wo-note">
      <div class="wo-note-dot" style="background:${color};"></div>
      <span>${n}</span>
    </div>
  `).join('');

  document.getElementById('wo-out-' + id).innerHTML = `
    <div class="wo-out-header" style="background:${color}08;">
      <div class="wo-tags">
        <span class="wo-tag" style="color:${color};border-color:${color}40;background:${color}12;">${w.format}</span>
        <span class="wo-tag" style="color:var(--text3);border-color:var(--bord2);background:var(--bg3);">${w.duration}</span>
      </div>
      <div class="wo-title">${w.title}</div>
      <div class="wo-tagline">${w.tagline}</div>
      <div class="wo-meta-pills">${tagsHtml}</div>
    </div>
    <div class="wo-structure">
      <div class="wo-structure-lbl">Workout</div>
      <div class="wo-moves">${movesHtml}</div>
    </div>
    <div class="wo-notes-block">
      <div class="wo-notes-lbl">Coaching Notes</div>
      ${notesHtml}
    </div>
  `;
}

function renderDay() {
  const d = DAYS[cur];
  const col = d.color;
  document.documentElement.style.setProperty('--c', col);
  document.getElementById('topbar-title').textContent = d.label + ' · ' + d.theme;
  document.getElementById('topbar-title').style.color = col;

  const typeStyle = d.type === 'OUTDOOR'
    ? `color:#7ED490;border-color:#7ED49040;background:#7ED49012;`
    : `color:${col};border-color:${col}40;background:${col}12;`;
  document.getElementById('topbar-right').innerHTML = `
    <span class="pill" style="${typeStyle}">${d.type}</span>
    <span class="pill" style="color:${col};border-color:${col}40;background:${col}12;">${d.duration}</span>
  `;

  let html = `<div class="content">
    <div class="hero">
      <div class="day-name">${d.label}</div>
      <div class="day-theme">${d.theme}</div>
      <div class="source-tag"><b>Johnson</b> ${d.bj}</div>
    </div>
    <div class="adapt">
      <div class="adapt-icon">⚡</div>
      <div>
        <div class="adapt-lbl">Advanced Adaptation</div>
        <div class="adapt-txt">${d.adapt}</div>
      </div>
    </div>`;

  if (d.isHiit) {
    html += phaseHtml(d.warmup, 1, col);
    html += hiitBlockHtml(d);
    html += phaseHtml(d.z2, 3, col);
  } else {
    d.phases.forEach((ph, i) => { html += phaseHtml(ph, i + 1, col); });
  }

  html += `
    <div class="purpose" style="background:${col}0C;border-color:${col}28;">
      <div class="purpose-lbl" style="color:${col};">Purpose</div>
      <div class="purpose-txt">${d.purpose}</div>
    </div>
  </div>`;

  document.getElementById('main-view').innerHTML = html;
  document.getElementById('scroll-area').scrollTop = 0;
}

function renderTracker() {

  document.getElementById('topbar-title').textContent = 'Performance Tracker';
  document.getElementById('topbar-title').style.color = '#E31B23';
  document.getElementById('topbar-right').innerHTML = `<span class="pill" style="color:#E31B23;border-color:#E31B2340;background:#E31B2312;">PERSONAL</span>`;

  const tabsHtml = [
    { id:'lifts', label:'Max Lifts' },
    { id:'sessions', label:'Sessions' },
    { id:'stats', label:'Overview' }
  ].map(t => `
    <button class="tracker-tab ${trackerTab === t.id ? 'active' : ''}" onclick="switchTrackerTab('${t.id}')">${t.label}</button>
  `).join('');

  document.getElementById('main-view').innerHTML = `
    <div class="tracker-page">
      <div class="tracker-tabs">${tabsHtml}</div>
      <div id="tracker-content"></div>
    </div>
  `;

  renderTrackerPanel();

function switchTrackerTab(tab) {
  trackerTab = tab;
  // Update tab buttons
  document.querySelectorAll('.tracker-tab').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.toLowerCase().replace(' ','') === tab.replace('-',''));
  });
  // Re-render based on selected content  
  renderTrackerPanel();
}

function renderTrackerPanel() {
  const container = document.getElementById('tracker-content');
  if (!container) return;
  if (trackerTab === 'lifts') container.innerHTML = renderLiftsPanel();
  else if (trackerTab === 'sessions') container.innerHTML = renderSessionsPanel();
  else container.innerHTML = renderStatsPanel();
}

// ── LIFTS PANEL ──
function renderLiftsPanel() {
  const liftCards = LIFTS_CONFIG.map(lift => {
    const pr = getLiftPR(lift.id);
    const entries = getLiftEntries(lift.id);
    const isExpanded = expandedLifts[lift.id];

    const entriesHtml = entries.length === 0
      ? `<div class="lift-no-history">No entries yet — log your first set above</div>`
      : entries.slice(0, 12).map(e => {
          const isPR = e.weight === pr;
          const d = new Date(e.date);
          const dateStr = d.toLocaleDateString('en-DK', { day:'numeric', month:'short' });
          return `
            <div class="lift-entry">
              <div>
                <span class="lift-entry-weight">${e.weight} ${lift.unit}</span>
                <span class="lift-entry-reps"> × ${e.reps}</span>
                ${e.note ? `<div style="font-size:10px;color:var(--text3);margin-top:2px;">${e.note}</div>` : ''}
              </div>
              <div style="display:flex;align-items:center;gap:8px;">
                ${isPR ? `<span class="lift-entry-pr-badge">PR</span>` : ''}
                <span class="lift-entry-date">${dateStr}</span>
                <button class="lift-entry-del" onclick="deleteLift('${lift.id}',${e.id})">✕</button>
              </div>
            </div>
          `;
        }).join('');

    return `
      <div class="lift-card" id="liftcard-${lift.id}">
        <div class="lift-card-top" onclick="toggleLift('${lift.id}')">
          <div class="lift-card-left">
            <div class="lift-name">${lift.name}</div>
            <div class="lift-target">Target: ${lift.target}</div>
          </div>
          <div class="lift-card-right">
            <div class="lift-pr">
              <div class="lift-pr-val">${pr !== null ? pr : '—'}</div>
              <div class="lift-pr-lbl">${pr !== null ? lift.unit : 'No data'}</div>
            </div>
            <div class="lift-expand-icon ${isExpanded ? 'open' : ''}">▼</div>
          </div>
        </div>
        <div class="lift-history ${isExpanded ? 'open' : ''}" id="lift-hist-${lift.id}">
          <div class="lift-history-inner">
            <div class="lift-log-form">
              <div class="lift-input-group">
                <div class="lift-input-lbl">Weight (${lift.unit})</div>
                <input class="lift-input" type="number" inputmode="decimal" id="lift-w-${lift.id}" placeholder="0" min="0" max="500" step="0.5">
              </div>
              <div class="lift-input-group" style="max-width:70px;">
                <div class="lift-input-lbl">Reps</div>
                <input class="lift-input" type="number" inputmode="numeric" id="lift-r-${lift.id}" placeholder="1" min="1" max="30">
              </div>
              <button class="lift-log-btn" onclick="logLift('${lift.id}')">Log</button>
            </div>
            <div class="lift-entries" id="lift-entries-${lift.id}">${entriesHtml}</div>
          </div>
        </div>
      </div>
    `;
  }).join('');

  return `
    <div class="tracker-section">
      <div class="tracker-section-head">
        <div class="tracker-section-title">Personal Records</div>
      </div>
      <div class="lift-cards">${liftCards}</div>
    </div>
  `;
}

function toggleLift(id) {
  expandedLifts[id] = !expandedLifts[id];
  const hist = document.getElementById('lift-hist-' + id);
  const icon = document.querySelector('#liftcard-' + id + ' .lift-expand-icon');
  if (hist) hist.classList.toggle('open', expandedLifts[id]);
  if (icon) icon.classList.toggle('open', expandedLifts[id]);
}

function logLift(liftId) {
  const wEl = document.getElementById('lift-w-' + liftId);
  const rEl = document.getElementById('lift-r-' + liftId);
  const w = parseFloat(wEl.value);
  const r = parseInt(rEl.value) || 1;
  if (!w || w <= 0) { showToast('Enter a weight'); return; }

  const oldPR = getLiftPR(liftId);
  saveLiftEntry(liftId, w, r, '');
  const newPR = getLiftPR(liftId);

  wEl.value = '';
  rEl.value = '';

  const lift = LIFTS_CONFIG.find(l => l.id === liftId);
  if (newPR > (oldPR || 0)) {
    showToast('🏆 New PR — ' + newPR + ' ' + lift.unit);
  } else {
    showToast('Logged ' + w + ' ' + lift.unit + ' × ' + r);
  }

  // Re-render just the entries for this lift
  const container = document.getElementById('lift-entries-' + liftId);
  if (container) {
    const entries = getLiftEntries(liftId);
    const pr = getLiftPR(liftId);
    if (entries.length === 0) {
      container.innerHTML = '<div class="lift-no-history">No entries yet</div>';
    } else {
      container.innerHTML = entries.slice(0, 12).map(e => {
        const isPR = e.weight === pr;
        const d = new Date(e.date);
        const dateStr = d.toLocaleDateString('en-DK', { day:'numeric', month:'short' });
        return `
          <div class="lift-entry">
            <div>
              <span class="lift-entry-weight">${e.weight} ${lift.unit}</span>
              <span class="lift-entry-reps"> × ${e.reps}</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
              ${isPR ? `<span class="lift-entry-pr-badge">PR</span>` : ''}
              <span class="lift-entry-date">${dateStr}</span>
              <button class="lift-entry-del" onclick="deleteLift('${liftId}',${e.id})">✕</button>
            </div>
          </div>
        `;
      }).join('');
    }
    // Update PR display
    const prVal = document.querySelector('#liftcard-' + liftId + ' .lift-pr-val');
    const prLbl = document.querySelector('#liftcard-' + liftId + ' .lift-pr-lbl');
    if (prVal) prVal.textContent = newPR || '—';
    if (prLbl) prLbl.textContent = newPR ? lift.unit : 'No data';
  }
}

function deleteLift(liftId, entryId) {
  deleteLiftEntry(liftId, entryId);
  showToast('Entry removed');
  renderTrackerPanel();
}

            </div>
          </div>
          <div class="session-row">
            <div class="session-input-group full">
              <div class="session-label">Notes (optional)</div>
              <input class="session-input" type="text" id="sess-notes" placeholder="Felt strong, new deadlift PR...">
            </div>
          </div>
          <button class="session-save-btn" onclick="logSession()">Save Session</button>
        </div>
        ${sessions.length > 0 ? `
          <div style="padding:0 15px 8px;">
            <div class="tracker-section-head" style="padding-top:8px;">
              <div class="tracker-section-title">Session History</div>
            </div>
          </div>
          <div class="session-entries">${sessionsHtml}</div>
        ` : `<div class="session-entries">${sessionsHtml}</div>`}
      </div>
    </div>
  `;
}

function logSession() {
  const dayIndex = parseInt(document.getElementById('sess-day').value);
  const duration = document.getElementById('sess-dur').value;
  const hrv = document.getElementById('sess-hrv').value;
  const rhr = document.getElementById('sess-rhr').value;
  const feeling = document.getElementById('sess-feel').value;
  const notes = document.getElementById('sess-notes').value.trim();

  saveSession({ dayIndex, duration: duration||null, hrv: hrv||null, rhr: rhr||null, feeling: feeling||null, notes: notes||null });
  showToast('Session logged ✓');
  renderTrackerPanel();
}

function deleteSessionEntry(id) {
  deleteSession(id);
  showToast('Session removed');
  renderTrackerPanel();
}

// ── STATS PANEL ──
function renderStatsPanel() {
  const sessions = getSessionLog();
  const weekCount = getWeeklyCount();
  const totalCount = getTotalSessions();

  // Get latest HRV and RHR from sessions
  const withHRV = sessions.filter(s => s.hrv);
  const withRHR = sessions.filter(s => s.rhr);
  const latestHRV = withHRV.length ? withHRV[0].hrv : '—';
  const latestRHR = withRHR.length ? withRHR[0].rhr : '—';

  // Calculate 7-day avg HRV
  const now = new Date();
  const week = new Date(now - 7*24*60*60*1000);
  const recentHRV = sessions.filter(s => new Date(s.date) >= week && s.hrv).map(s => parseFloat(s.hrv));
  const avgHRV = recentHRV.length ? Math.round(recentHRV.reduce((a,b)=>a+b,0)/recentHRV.length) : null;

  // PR summary
  const topLifts = LIFTS_CONFIG.map(l => ({ name:l.name, pr:getLiftPR(l.id), unit:l.unit })).filter(l => l.pr !== null);

  const liftProgressHtml = topLifts.length === 0
    ? `<div style="font-size:12px;color:var(--text3);font-style:italic;padding:4px 0;">No lifts logged yet — head to Max Lifts to start tracking</div>`
    : topLifts.map(l => {
        // Simple progress toward target for DL and squat
        let pct = null;
        if (l.name === 'Deadlift') pct = Math.min(100, Math.round((l.pr / 185) * 100));
        if (l.name === 'Back Squat') pct = Math.min(100, Math.round((l.pr / 165) * 100));
        return `
          <div class="progress-bar-row" style="flex-direction:column;align-items:flex-start;gap:4px;">
            <div style="display:flex;width:100%;justify-content:space-between;align-items:center;">
              <span class="progress-bar-lbl">${l.name}</span>
              <span class="progress-bar-val">${l.pr} ${l.unit}</span>
            </div>
            ${pct !== null ? `
              <div style="width:100%;display:flex;align-items:center;gap:8px;">
                <div class="progress-bar-bg" style="flex:1;">
                  <div class="progress-bar-fill" style="width:${pct}%;background:#E31B23;"></div>
                </div>
                <span style="font-size:10px;color:var(--text3);min-width:30px;text-align:right;">${pct}%</span>
              </div>
            ` : ''}
          </div>
        `;
      }).join('');

  const hvrvHtml = sessions.length > 0 ? sessions.slice(0, 8).filter(s => s.hrv).map(s => {
    const hrv = parseFloat(s.hrv);
    const pct = Math.min(100, Math.round((hrv / 130) * 100));
    const d = new Date(s.date);
    const dateStr = d.toLocaleDateString('en-DK', { day:'numeric', month:'short' });
    return `
      <div class="progress-bar-row" style="gap:8px;">
        <span style="font-size:10px;color:var(--text3);width:48px;flex-shrink:0;">${dateStr}</span>
        <div class="progress-bar-bg" style="flex:1;">
          <div class="progress-bar-fill" style="width:${pct}%;background:${hrv >= 110 ? '#7ED4A8' : hrv >= 95 ? '#D4A96A' : '#D47E7E'};"></div>
        </div>
        <span style="font-size:10px;font-weight:700;color:var(--text);min-width:40px;text-align:right;">${hrv} ms</span>
      </div>
    `;
  }).join('') : `<div style="font-size:12px;color:var(--text3);font-style:italic;">Log sessions with HRV data to see trends</div>`;

  return `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-val">${weekCount}</div>
        <div class="stat-lbl">This Week</div>
        <div class="stat-sub">Sessions logged</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${totalCount}</div>
        <div class="stat-lbl">Total Sessions</div>
        <div class="stat-sub">All time</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:${avgHRV && avgHRV >= 110 ? '#7ED4A8' : '#E31B23'};">${avgHRV || latestHRV}</div>
        <div class="stat-lbl">HRV</div>
        <div class="stat-sub">${avgHRV ? '7-day avg · target 115–125' : 'Latest reading'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${latestRHR}</div>
        <div class="stat-lbl">RHR</div>
        <div class="stat-sub">Latest · target 40–44</div>
      </div>
    </div>

    <div class="tracker-section">
      <div class="tracker-section-head">
        <div class="tracker-section-title">Lift Progress</div>
      </div>
      <div class="p-card">
        <div class="progress-bar-wrap">
          ${liftProgressHtml}
        </div>
      </div>
    </div>

    <div class="tracker-section">
      <div class="tracker-section-head">
        <div class="tracker-section-title">HRV Trend (target: 115–125 ms)</div>
      </div>
      <div class="p-card">
        <div class="progress-bar-wrap" style="display:flex;flex-direction:column;gap:6px;">
          ${hvrvHtml}
        </div>
      </div>
    </div>
  `;
}

// ─────────────────────────────────────────────────────
// TAB BAR
// ─────────────────────────────────────────────────────

function renderTabBar() {
  const tabs = DAYS.map((d, i) => {
    const active = viewMode === 'day' && i === cur;
    return `
      <button class="tab-btn ${active ? 'active' : ''}" onclick="selDay(${i})">
        <div class="tab-active-bg" style="background:${d.color};"></div>
        <span class="tab-icon">${d.icon}</span>
        <span class="tab-label">${d.day}</span>
      </button>
    `;
  }).join('');

  const notesActive = viewMode === 'notes';
  const trackerActive = viewMode === 'tracker';

  document.getElementById('tab-bar').innerHTML = tabs + `
    <button class="tab-btn ${notesActive ? 'active' : ''}" onclick="selNotes()">
      <div class="tab-active-bg" style="background:#888;"></div>
      <span class="tab-icon">📋</span>
      <span class="tab-label">Notes</span>
    </button>
    <button class="tab-btn ${trackerActive ? 'active' : ''}" onclick="selTracker()">
      <div class="tab-active-bg" style="background:#E31B23;"></div>
      <span class="tab-icon">📊</span>
      <span class="tab-label">Track</span>
    </button>
  `;
}

function selDay(i) {
  cur = i; viewMode = 'day';
  renderDay(); renderTabBar();
}

function selNotes() {
  viewMode = 'notes';
  renderNotes(); renderTabBar();
}

function selTracker() {
  viewMode = 'tracker';
  renderTracker(); renderTabBar();
}

// ─────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────

const dayMap = {1:0, 2:1, 3:2, 4:3, 5:4, 6:5, 0:6};
cur = dayMap[new Date().getDay()] ?? 0;
renderDay();
renderTabBar();
</script>
</body>
