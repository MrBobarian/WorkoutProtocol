<title>Emil's Protocol</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;1,300&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:#141414; --bg2:#1C1C1C; --bg3:#2A2A2A;
  --border:#2E2E2E; --bord2:#3A3A3A;
  --text:#E8E4DC; --text2:#A09A90; --text3:#5C5650;
  --c:#D4A96A;
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
}

html, body {
  height: 100%; height: 100dvh;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'Instrument Sans', sans-serif;
  -webkit-text-size-adjust: 100%;
  -webkit-tap-highlight-color: transparent;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
}

.topbar {
  flex-shrink: 0;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding-top: calc(var(--sat) + 14px);
  padding-bottom: 14px;
  padding-left: 20px;
  padding-right: 20px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 12px;
}

.topbar-left { min-width: 0; }

.app-eyebrow {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 2px;
}

.topbar-title {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.5px;
  line-height: 1.1;
  color: var(--c);
  transition: color .25s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.topbar-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  flex-shrink: 0;
}

.pill {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: 20px;
  border: 1px solid;
  white-space: nowrap;
}

.scroll-area {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
}

.content {
  padding: 20px 16px 28px;
  animation: fadeUp .2s ease both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}

.hero {
  margin-bottom: 20px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.day-name {
  font-family: 'Fraunces', serif;
  font-size: 40px;
  font-weight: 600;
  letter-spacing: -1.5px;
  line-height: 1;
  color: var(--c);
  transition: color .25s;
}

.day-theme {
  font-size: 15px;
  color: var(--text2);
  margin-top: 5px;
  font-weight: 500;
}

.source-tag {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 6px 12px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 7px;
  font-size: 11px;
  color: var(--text2);
  margin-top: 12px;
}
.source-tag b {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--c);
  transition: color .25s;
}

.adapt {
  display: flex;
  gap: 12px;
  padding: 14px 15px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 22px;
}
.adapt-icon { font-size: 17px; flex-shrink: 0; margin-top: 1px; }
.adapt-lbl  { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--c); margin-bottom: 4px; transition: color .25s; }
.adapt-txt  { font-size: 12px; color: var(--text2); line-height: 1.65; }

.phase { margin-bottom: 20px; }

.phase-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.phase-num {
  width: 24px; height: 24px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700;
  flex-shrink: 0; color: #141414;
  transition: background .25s;
}
.phase-title { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
.phase-dur   { font-size: 11px; color: var(--text3); font-weight: 500; }

.ex-table {
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  background: var(--bg2);
}

.ex-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  padding: 13px 15px;
  border-bottom: 1px solid var(--border);
  transition: background .1s;
  min-height: 44px;
}
.ex-row:last-child { border-bottom: none; }
.ex-row:active { background: var(--bg3); }

.ex-body  { flex: 1; min-width: 0; }
.ex-name  { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; line-height: 1.3; }
.ex-desc  { font-size: 11px; color: var(--text2); line-height: 1.55; }
.ex-sets  {
  font-size: 10px; font-weight: 700; color: var(--c);
  white-space: nowrap; padding: 3px 9px; border-radius: 6px;
  background: var(--bg3); border: 1px solid var(--bord2);
  flex-shrink: 0; margin-top: 2px; transition: color .25s;
}

/* ── HIIT GENERATOR ── */
.hiit-wrap { margin-bottom: 20px; }

.hiit-card {
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  background: var(--bg2);
}

.hiit-card-head {
  padding: 13px 15px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.hiit-badge {
  font-size: 8px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  padding: 3px 8px; border-radius: 4px;
}

.hiit-card-name {
  font-size: 14px; font-weight: 600; color: var(--text); flex: 1;
}

.hiit-goal-block {
  padding: 13px 15px;
  border-bottom: 1px solid var(--border);
}
.hiit-goal-lbl { font-size: 8px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text3); margin-bottom: 5px; }
.hiit-goal-txt { font-size: 12px; color: var(--text2); line-height: 1.6; }

.hiit-constraints {
  padding: 12px 15px;
  border-bottom: 1px solid var(--border);
  display: flex; flex-wrap: wrap; gap: 6px;
}

.constraint-chip {
  font-size: 10px; font-weight: 600; padding: 4px 10px;
  border-radius: 6px; border: 1px solid; white-space: nowrap;
  letter-spacing: 0.3px;
}

.gen-row {
  padding: 12px 15px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.gen-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 0 20px;
  height: 48px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-family: 'Instrument Sans', sans-serif;
  font-size: 13px; font-weight: 700;
  letter-spacing: 0.5px;
  transition: opacity .15s, transform .1s;
  flex-shrink: 0;
}
.gen-btn:active { opacity: .85; transform: scale(0.97); }

.gen-hint {
  font-size: 11px;
  color: var(--text3);
  font-style: italic;
  line-height: 1.4;
}

.wo-empty {
  padding: 28px 15px;
  text-align: center;
  color: var(--text3);
  font-size: 12px;
  font-style: italic;
}

.wo-out-header {
  padding: 13px 15px 11px;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}

.wo-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
.wo-tag  { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; border: 1px solid; }

.wo-title   { font-size: 17px; font-weight: 600; color: var(--text); line-height: 1.2; }
.wo-tagline { font-size: 12px; color: var(--text2); margin-top: 3px; font-style: italic; }

.wo-meta-pills { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 7px; }
.wo-meta-pill  { font-size: 9px; color: var(--text3); padding: 2px 7px; border-radius: 4px; background: var(--bg3); border: 1px solid var(--bord2); }

.wo-structure {
  padding: 13px 15px;
  border-bottom: 1px solid var(--border);
}
.wo-structure-lbl { font-size: 8px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text3); margin-bottom: 9px; }

.wo-moves { display: flex; flex-direction: column; gap: 5px; }
.wo-move-row {
  display: flex; align-items: flex-start; gap: 9px;
  padding: 9px 11px; border-radius: 8px; background: var(--bg3);
}
.wo-move-num  { font-size: 9px; font-weight: 700; color: var(--text3); flex-shrink: 0; min-width: 14px; padding-top: 2px; }
.wo-move-body { flex: 1; min-width: 0; }
.wo-move-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; }
.wo-move-desc { font-size: 11px; color: var(--text2); margin-top: 2px; line-height: 1.45; }
.wo-move-reps { font-size: 10px; font-weight: 700; white-space: nowrap; padding: 2px 8px; border-radius: 5px; flex-shrink: 0; margin-top: 2px; }

.wo-notes-block { padding: 13px 15px; }
.wo-notes-lbl { font-size: 8px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; }
.wo-note { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 7px; font-size: 12px; color: var(--text2); line-height: 1.55; }
.wo-note:last-child { margin-bottom: 0; }
.wo-note-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--c); flex-shrink: 0; margin-top: 5px; transition: background .25s; }

.purpose {
  border-radius: 12px; padding: 16px 17px; margin-top: 4px; border: 1px solid;
}
.purpose-lbl { font-size: 8px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 7px; }
.purpose-txt { font-family: 'Fraunces', serif; font-size: 14px; font-weight: 300; line-height: 1.75; font-style: italic; color: var(--text2); }

/* ── NOTES PAGE ── */
.notes-page { padding: 20px 16px 28px; }
.notes-page-title { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 300; color: var(--text); margin-bottom: 18px; letter-spacing: -0.3px; }
.p-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 15px 16px; margin-bottom: 10px; }
.p-title { font-size: 11px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: var(--text); margin-bottom: 5px; }
.p-body  { font-size: 12px; color: var(--text2); line-height: 1.7; }

/* ── TRACKER PAGE ── */
.tracker-page { padding: 16px 16px 28px; animation: fadeUp .2s ease both; }

.tracker-section { margin-bottom: 22px; }
.tracker-section-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.tracker-section-title {
  font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3);
}

.lift-cards { display: flex; flex-direction: column; gap: 8px; }

.lift-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

.lift-card-top {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 15px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.lift-card-top:active { background: var(--bg3); }

.lift-card-left { flex: 1; min-width: 0; }
.lift-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.lift-target { font-size: 11px; color: var(--text3); }

.lift-card-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.lift-pr {
  display: flex; flex-direction: column; align-items: flex-end;
}
.lift-pr-val {
  font-family: 'Fraunces', serif;
  font-size: 20px; font-weight: 600; line-height: 1;
  color: var(--c); transition: color .25s;
}
.lift-pr-lbl { font-size: 8px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); margin-top: 1px; }
.lift-expand-icon { font-size: 11px; color: var(--text3); transition: transform .2s; }
.lift-expand-icon.open { transform: rotate(180deg); }

.lift-history {
  border-top: 1px solid var(--border);
  display: none;
}
.lift-history.open { display: block; }

.lift-history-inner { padding: 12px 15px; }

.lift-log-form {
  display: flex; gap: 8px; margin-bottom: 12px; align-items: flex-end;
}
.lift-input-group { display: flex; flex-direction: column; gap: 4px; flex: 1; }
.lift-input-lbl { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); }
.lift-input {
  background: var(--bg3);
  border: 1px solid var(--bord2);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 14px; font-weight: 600;
  color: var(--text);
  font-family: 'Instrument Sans', sans-serif;
  width: 100%;
  -webkit-appearance: none;
}
.lift-input:focus { outline: none; border-color: var(--c); }

.lift-log-btn {
  background: var(--c);
  color: #141414;
  border: none;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 12px; font-weight: 700;
  font-family: 'Instrument Sans', sans-serif;
  cursor: pointer;
  transition: opacity .15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.lift-log-btn:active { opacity: .8; }

.lift-entries { display: flex; flex-direction: column; gap: 4px; }
.lift-entry {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 10px;
  background: var(--bg);
  border-radius: 7px;
  border: 1px solid var(--border);
}
.lift-entry-weight { font-size: 13px; font-weight: 700; color: var(--text); }
.lift-entry-reps { font-size: 11px; color: var(--text3); }
.lift-entry-date { font-size: 10px; color: var(--text3); }
.lift-entry-pr-badge {
  font-size: 8px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  padding: 2px 7px; border-radius: 4px;
  background: var(--c); color: #141414;
}
.lift-entry-del {
  background: none; border: none; cursor: pointer;
  font-size: 13px; color: var(--text3); padding: 2px 4px;
  opacity: 0.6;
}
.lift-entry-del:active { opacity: 1; }

.lift-no-history {
  font-size: 12px; color: var(--text3); font-style: italic;
  padding: 4px 0;
}

/* Session log */
.session-log-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

.session-form-inner { padding: 14px 15px; }

.session-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }

.session-input-group { display: flex; flex-direction: column; gap: 4px; }
.session-input-group.full { flex: 1 1 100%; }
.session-input-group.half { flex: 1 1 calc(50% - 4px); min-width: 100px; }
.session-input-group.third { flex: 1 1 calc(33% - 4px); min-width: 80px; }

.session-input {
  background: var(--bg3);
  border: 1px solid var(--bord2);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 13px; font-weight: 500;
  color: var(--text);
  font-family: 'Instrument Sans', sans-serif;
  width: 100%;
  -webkit-appearance: none;
}
.session-input:focus { outline: none; border-color: var(--c); }

.session-label { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); }

.session-save-btn {
  width: 100%;
  background: var(--c);
  color: #141414;
  border: none;
  border-radius: 10px;
  padding: 13px;
  font-size: 13px; font-weight: 700;
  font-family: 'Instrument Sans', sans-serif;
  cursor: pointer;
  transition: opacity .15s;
  margin-top: 4px;
}
.session-save-btn:active { opacity: .8; }

/* Session entries list */
.session-entries { padding: 0 15px 12px; }
.session-entry {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 11px 12px;
  background: var(--bg3);
  border-radius: 9px;
  margin-bottom: 6px;
  position: relative;
}
.session-entry-day {
  font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  color: var(--text3); flex-shrink: 0; width: 28px; padding-top: 2px;
}
.session-entry-body { flex: 1; min-width: 0; }
.session-entry-date { font-size: 11px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.session-entry-metrics { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 5px; }
.session-metric { font-size: 10px; color: var(--text2); padding: 2px 7px; background: var(--bg2); border-radius: 4px; border: 1px solid var(--border); }
.session-entry-notes { font-size: 11px; color: var(--text3); margin-top: 4px; font-style: italic; line-height: 1.45; }
.session-entry-del {
  background: none; border: none; cursor: pointer;
  font-size: 13px; color: var(--text3); padding: 2px;

<body>
<div class="app">

  <div class="topbar">
    <div class="topbar-left">
      <div class="app-eyebrow">Emil's Protocol</div>
      <div class="topbar-title" id="topbar-title">–</div>
    </div>
    <div class="topbar-right" id="topbar-right"></div>
  </div>

  <div class="scroll-area" id="scroll-area">
    <div id="main-view"></div>
  </div>

  <div class="tab-bar" id="tab-bar"></div>

</div>

<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────────────
// TRACKABLE EXERCISES — which ex-rows get inline loggers
// id must be unique, matches localStorage key
// ─────────────────────────────────────────────────────
const TRACKABLE = {
  // MON
  // Back Squat: 1.75× BW = 140kg. Longevity floor — robust lower body, not elite.
  'back-squat':       { name:'Back Squat',            unit:'kg',      target:'140–165 kg', reps:5,  goal1rm:140, increment:2.5 },
  // Weighted Pull-Ups: BW + 40kg added = meaningful pulling strength, shoulder longevity
  'weighted-pullups': { name:'Weighted Pull-Ups',      unit:'kg added', target:'+40 kg',    reps:6,  goal1rm:40,  increment:2.5 },
  // Bench Press: 1.25× BW = 100kg. Upper body pressing for functional independence
  'bench-press':      { name:'Barbell Bench Press',    unit:'kg',      target:'100 kg',     reps:5,  goal1rm:100, increment:2.5 },
  // WED
  // Deadlift: 2.0× BW = 160kg. Attia/longevity floor for men. Already in protocol.
  'deadlift':         { name:'Deadlift',               unit:'kg',      target:'160–185 kg', reps:4,  goal1rm:160, increment:5   },
  // RDL: 1.5× BW = 120kg. Hamstring and posterior chain health, not tested for max
  'rdl':              { name:'Romanian Deadlift',       unit:'kg',      target:'120 kg',     reps:10, goal1rm:120, increment:5   },
  // Strict OHP: 0.75× BW = 60kg. Overhead pressing = functional independence (suitcase overhead)
  'ohp-wed':          { name:'Strict OHP (Wed)',        unit:'kg',      target:'60 kg',      reps:5,  goal1rm:60,  increment:2.5 },
  // FRI
  // Bulgarian Split Squat: 0.75× BW per side = 60kg. Unilateral leg strength for injury prevention
  'split-squat':      { name:'Bulgarian Split Squat',  unit:'kg/side', target:'60 kg/side', reps:8,  goal1rm:60,  increment:2.5 },
  // OHP (Fri same as Wed — shared goal, tracked separately by day)
  'ohp-fri':          { name:'Strict OHP (Fri)',        unit:'kg',      target:'60 kg',      reps:5,  goal1rm:60,  increment:2.5 },
  // Pendlay Row: 1.25× BW = 100kg. Horizontal pull mirrors push for shoulder health
  'pendlay-row':      { name:'Pendlay Row',             unit:'kg',      target:'100 kg',     reps:6,  goal1rm:100, increment:2.5 },
};

// Map exercise names in protocol to trackable IDs
const EX_NAME_TO_ID = {
  'Back Squat': 'back-squat',
  'Weighted Pull-Ups': 'weighted-pullups',
  'Barbell Bench Press': 'bench-press',
  'Deadlift': 'deadlift',
  'Romanian Deadlift': 'rdl',
  'Strict Overhead Press': null, // resolved by day below
  'Bulgarian Split Squat': 'split-squat',
  'Pendlay Row': 'pendlay-row',
};

// Day-specific OHP disambiguation
function resolveTrackableId(exName, dayIdx) {
  if (exName === 'Strict Overhead Press') {
    return dayIdx === 2 ? 'ohp-wed' : 'ohp-fri';
  }
  return EX_NAME_TO_ID[exName] || null;
}

// ─────────────────────────────────────────────────────
// STORAGE — localStorage + Gist sync
// ─────────────────────────────────────────────────────
const DB = {
  get(key) {
    try { return JSON.parse(localStorage.getItem('ep_' + key) || 'null'); } catch { return null; }
  },
  set(key, val) {
    try { localStorage.setItem('ep_' + key, JSON.stringify(val)); markDirty(); } catch(e) { console.warn('Storage full', e); }
  }
};

// ─────────────────────────────────────────────────────
// LIFT DATA HELPERS
// ─────────────────────────────────────────────────────
function getLiftEntries(id) { return DB.get('lift_' + id) || []; }

function getLastEntry(id) {
  const entries = getLiftEntries(id);
  return entries.length ? entries[0] : null;
}

function saveLiftEntry(id, weight, reps) {
  const entries = getLiftEntries(id);
  const entry = { id: Date.now(), weight: parseFloat(weight), reps: parseInt(reps) || 1, date: new Date().toISOString() };
  entries.unshift(entry);
  DB.set('lift_' + id, entries.slice(0, 80));
  return entry;
}

function deleteLiftEntry(id, entryId) {
  DB.set('lift_' + id, getLiftEntries(id).filter(e => e.id !== entryId));
}

// Epley formula: e1RM = w × (1 + r/30)
function epley(weight, reps) {
  if (reps === 1) return weight;
  return Math.round(weight * (1 + reps / 30));
}

function getE1RMHistory(id) {
  return getLiftEntries(id).map(e => ({ e1rm: epley(e.weight, e.reps), date: e.date, weight: e.weight, reps: e.reps }));
}

function getPR1RM(id) {
  const hist = getE1RMHistory(id);
  return hist.length ? Math.max(...hist.map(h => h.e1rm)) : null;
}

// ─────────────────────────────────────────────────────
// ONE-TIME MIGRATION: old key → new key
// Previous system stored under different IDs — migrate
// data transparently so no logged entries are lost
// ─────────────────────────────────────────────────────
function migrateOldKeys() {
  const map = {
    'squat':      'back-squat',
    'pullup':     'weighted-pullups',
    'benchpress': 'bench-press',
    'ohpress':    'ohp-wed',    // best guess — also copy to ohp-fri
    'splitlunge': 'split-squat',
    'pendlay':    'pendlay-row',
  };
  Object.entries(map).forEach(([oldId, newId]) => {
    const oldKey = 'ep_lift_' + oldId;
    const newKey = 'ep_lift_' + newId;
    const oldData = localStorage.getItem(oldKey);
    if (!oldData) return;
    // Only migrate if new key is empty
    if (!localStorage.getItem(newKey)) {
      localStorage.setItem(newKey, oldData);
    }
    // Special case: OHP data also goes to ohp-fri if empty
    if (oldId === 'ohpress') {
      const friKey = 'ep_lift_ohp-fri';
      if (!localStorage.getItem(friKey)) {
        localStorage.setItem(friKey, oldData);
      }
    }
  });
}

// ─────────────────────────────────────────────────────
// PROGRESSION ENGINE
// Based on: APRE trend analysis + intermediate/advanced
// progression rates from Zourdos, Helms, Stronger By Science
// ─────────────────────────────────────────────────────

function getProgressionAdvice(id) {
  const cfg = TRACKABLE[id];
  const hist = getE1RMHistory(id); // newest first
  const entries = getLiftEntries(id); // newest first, raw weight

  if (entries.length === 0) return { status: 'nodata' };

  const pr = getPR1RM(id);
  const latestWeight = entries[0].weight;
  const latestE1rm = hist[0].e1rm;

  // ── Trend analysis: last 3 sessions ──
  const recent = hist.slice(0, 3).reverse(); // oldest to newest of recent
  let trend = 'stable';
  if (recent.length >= 2) {
    const first = recent[0].e1rm;
    const last  = recent[recent.length - 1].e1rm;
    const delta = last - first;
    const pctChange = delta / first;
    if (pctChange >= 0.02) trend = 'progressing';       // +2%+ = clear gain
    else if (pctChange <= -0.02) trend = 'declining';   // -2%+ = regressing
    else trend = 'stable';
  }

  // ── Stall detection: same weight logged ≥ 2 consecutive sessions ──
  let stalled = false;
  if (entries.length >= 2) {
    const sameCount = entries.slice(0, 3).filter(e => e.weight === latestWeight).length;
    if (sameCount >= 2) stalled = true;
  }

  // ── Direction of most recent change ──
  // Did the last logged session go up, down, or same vs the one before?
  const lastWeight    = entries[0]?.weight || 0;
  const prevWeight    = entries[1]?.weight || lastWeight;
  const sessionDelta  = lastWeight - prevWeight; // + = went up, - = went down, 0 = same

  // ── Recovery detection ──
  // If trend is declining but the most recent session was already lower than the one
  // before (you already dropped), treat as "recovering" — hold and rebuild, don't drop again.
  const alreadyDropped = trend === 'declining' && sessionDelta <= 0;

  // ── Next session suggestion ──
  let nextWeight;
  let advice;
  let urgency = 'normal';

  if (trend === 'progressing' && !stalled) {
    nextWeight = latestWeight + cfg.increment;
    advice = `Add ${cfg.increment}kg next session — you've logged ${recent.length >= 2 ? Math.round(recent[recent.length-1].e1rm - recent[0].e1rm) + 'kg e1RM gain across recent sessions' : 'consistent progress'}. Trend is clearly up.`;
    urgency = 'push';
  } else if (stalled) {
    const stalledSessions = entries.filter(e => e.weight === latestWeight).length;
    if (stalledSessions >= 3) {
      nextWeight = latestWeight + cfg.increment;
      advice = `You've logged ${latestWeight}${cfg.unit} for ${stalledSessions} sessions. Time to commit to the jump — add ${cfg.increment}kg and push through. If it fails, consider a deload week before retrying.`;
      urgency = 'push';
    } else {
      nextWeight = latestWeight;
      advice = `Same weight for 2 sessions. Hold at ${latestWeight}${cfg.unit} — but make sure the set is genuinely hard (2 reps left in the tank max). If it feels easy, you're ready to jump.`;
      urgency = 'hold';
    }
  } else if (trend === 'declining' && !alreadyDropped) {
    // Declining and you haven't dropped yet — suggest the first drop
    nextWeight = latestWeight - cfg.increment;
    advice = `e1RM has dipped across recent sessions. Drop to ${nextWeight}${cfg.unit} next session, rebuild quality there, then re-attack. Declining trend is usually a recovery or sleep signal, not a real strength loss.`;
    urgency = 'deload';
  } else if (alreadyDropped) {
    // You already responded to the dip by going lighter — now hold and rebuild
    nextWeight = latestWeight;
    advice = `You've already pulled back the weight — good response. Hold at ${latestWeight}${cfg.unit} this session and make it a quality set. Once it feels solid with 2–3 reps left in the tank, start working back up by ${cfg.increment}kg.`;
    urgency = 'hold';
  } else {
    nextWeight = latestWeight;
    advice = `Holding steady. Log ${latestWeight}${cfg.unit} again next session. If it feels like you have 3+ reps left in the tank, bump it by ${cfg.increment}kg the following session.`;
    urgency = 'normal';
  }

  // ── Goal proximity ──
  let goalInfo = null;
  if (cfg.goal1rm) {
    const gap = cfg.goal1rm - pr;
    const pctOfGoal = Math.min(100, Math.round((pr / cfg.goal1rm) * 100));
    // Estimate weeks at current rate
    // Intermediate: ~2.5kg e1RM/month realistic for compounds
    // Advanced (>80% of goal): ~1.25kg/month
    const isNearGoal = pctOfGoal >= 80;
    const monthlyGainKg = isNearGoal ? 1.25 : 2.5;
    const weeksToGoal = gap > 0 ? Math.round((gap / monthlyGainKg) * 4) : 0;
    goalInfo = { gap, pctOfGoal, weeksToGoal, pr, goal: cfg.goal1rm };
  }

  return {
    status: 'ok',
    trend,
    stalled,
    latestWeight,
    latestE1rm,
    nextWeight,
    advice,
    urgency,
    goalInfo,
  };
}

// ─────────────────────────────────────────────────────
// SESSION LOG
// ─────────────────────────────────────────────────────
function getSessionLog() { return DB.get('sessions') || []; }

function saveSession(session) {
  const sessions = getSessionLog();
  sessions.unshift({ id: Date.now(), ...session, date: new Date().toISOString() });
  DB.set('sessions', sessions.slice(0, 120));
}

function deleteSession(id) {
  DB.set('sessions', getSessionLog().filter(s => s.id !== id));
}

function getWeeklyCount() {
  const now = new Date();
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - now.getDay() + 1);
  weekStart.setHours(0,0,0,0);
  return getSessionLog().filter(s => new Date(s.date) >= weekStart).length;
}

// ─────────────────────────────────────────────────────
// GITHUB GIST SYNC
// ─────────────────────────────────────────────────────
const GIST_FILENAME = 'emils_protocol_data.json';
let syncStatus = 'idle'; // idle | syncing | synced | error
let syncStatusText = 'Not configured';
let syncExpanded = false;
let dirtyTimer = null;

function getGistConfig() {
  return {
    token: localStorage.getItem('ep_gist_token') || '',
    gistId: localStorage.getItem('ep_gist_id') || '',
  };
}

function saveGistConfig(token, gistId) {
  localStorage.setItem('ep_gist_token', token);
  localStorage.setItem('ep_gist_id', gistId);
}

function markDirty() {
  // Auto-sync 4s after last change if configured
  const { token, gistId } = getGistConfig();
  if (!token || !gistId) return;
  clearTimeout(dirtyTimer);
  dirtyTimer = setTimeout(() => gistPush(true), 4000);
}

function getAllLocalData() {
  const data = { version: 1, exported: new Date().toISOString(), lifts: {}, sessions: [] };
  Object.keys(TRACKABLE).forEach(id => {
    const entries = getLiftEntries(id);
    if (entries.length) data.lifts[id] = entries;
  });
  data.sessions = getSessionLog();
  return data;
}

function restoreFromData(data) {
  if (!data || data.version !== 1) return false;
  Object.keys(data.lifts || {}).forEach(id => {
    localStorage.setItem('ep_lift_' + id, JSON.stringify(data.lifts[id]));
  });
  if (data.sessions) localStorage.setItem('ep_sessions', JSON.stringify(data.sessions));
  return true;
}

async function gistPush(silent = false) {
  const { token, gistId } = getGistConfig();
  if (!token || !gistId) { showToast('Configure Gist first'); return; }

  setSyncStatus('syncing', 'Saving...');
  try {
    const resp = await fetch(`https://api.github.com/gists/${gistId}`, {
      method: 'PATCH',
      headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ files: { [GIST_FILENAME]: { content: JSON.stringify(getAllLocalData(), null, 2) } } })
    });
    if (!resp.ok) throw new Error(resp.status);
    setSyncStatus('synced', 'Saved ' + new Date().toLocaleTimeString('en-DK', { hour:'2-digit', minute:'2-digit' }));
    if (!silent) showToast('✓ Synced to GitHub');
  } catch(e) {
    setSyncStatus('error', 'Sync failed');
    if (!silent) showToast('Sync failed — check token');
  }
}

async function gistPull() {
  const { token, gistId } = getGistConfig();
  if (!token || !gistId) { showToast('Configure Gist first'); return; }

  setSyncStatus('syncing', 'Loading...');
  try {
    const resp = await fetch(`https://api.github.com/gists/${gistId}`, {
      headers: { Authorization: `token ${token}` }
    });
    if (!resp.ok) throw new Error(resp.status);
    const gist = await resp.json();
    const file = gist.files[GIST_FILENAME];
    if (!file) throw new Error('File not found in Gist');
    const data = JSON.parse(file.content);
    if (!restoreFromData(data)) throw new Error('Invalid data format');
    setSyncStatus('synced', 'Loaded ' + new Date().toLocaleTimeString('en-DK', { hour:'2-digit', minute:'2-digit' }));
    showToast('✓ Data loaded from GitHub');
    renderDay(); // refresh current view
  } catch(e) {
    setSyncStatus('error', 'Pull failed');
    showToast('Pull failed — ' + e.message);
  }
}

async function gistCreate() {
  const token = document.getElementById('sync-token')?.value.trim();
  if (!token) { showToast('Enter your token first'); return; }

  setSyncStatus('syncing', 'Creating Gist...');
  try {
    const resp = await fetch('https://api.github.com/gists', {
      method: 'POST',
      headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        description: "Emil's Protocol — fitness data",
        public: false,
        files: { [GIST_FILENAME]: { content: JSON.stringify(getAllLocalData(), null, 2) } }
      })
    });
    if (!resp.ok) throw new Error(resp.status);
    const gist = await resp.json();
    saveGistConfig(token, gist.id);
    setSyncStatus('synced', 'Gist created ✓');
    showToast('✓ Gist created — you\'re synced');
    renderSyncBanner();
  } catch(e) {
    setSyncStatus('error', 'Failed to create');
    showToast('Failed — check token permissions');
  }
}

function saveGistSettings() {
  const token = document.getElementById('sync-token')?.value.trim();
  const gistId = document.getElementById('sync-gistid')?.value.trim();
  if (!token) { showToast('Token required'); return; }
  saveGistConfig(token, gistId);
  showToast('Settings saved');
  renderSyncBanner();
}

function setSyncStatus(status, text) {
  syncStatus = status;
  syncStatusText = text;
  // Update dot and text in place if banner exists
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-text');
  if (dot) {
    dot.className = 'sync-dot' + (status === 'synced' ? ' synced' : status === 'error' ? ' error' : status === 'syncing' ? ' syncing' : '');
  }
  if (txt) txt.textContent = text;
}

function toggleSync() {
  syncExpanded = !syncExpanded;
  const body = document.getElementById('sync-body');
  if (body) body.classList.toggle('open', syncExpanded);
}

function exportData() {
  const data = JSON.stringify(getAllLocalData(), null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'emils_protocol_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Export downloaded');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (restoreFromData(data)) {
        showToast('✓ Data imported');
        renderDay();
      } else {
        showToast('Invalid file format');
      }
    } catch { showToast('Could not read file'); }
  };
  reader.readAsText(file);
}

function renderSyncBanner() {
  const cfg = getGistConfig();
  const isConfigured = !!(cfg.token && cfg.gistId);
  const dotClass = 'sync-dot' + (syncStatus === 'synced' ? ' synced' : syncStatus === 'error' ? ' error' : syncStatus === 'syncing' ? ' syncing' : '');

  return `
    <div class="sync-banner">
      <div class="sync-banner-head" onclick="toggleSync()">
        <div class="sync-banner-title">
          <div class="${dotClass}" id="sync-dot"></div>
          GitHub Sync
        </div>
        <div class="sync-status-text" id="sync-text">${isConfigured ? syncStatusText : 'Tap to configure'}</div>
      </div>
      <div class="sync-body ${syncExpanded ? 'open' : ''}" id="sync-body">
        <div class="sync-field-lbl">GitHub Personal Access Token</div>
        <input class="sync-input" id="sync-token" type="password"
          placeholder="ghp_xxxxxxxxxxxx"
          value="${cfg.token}"
          autocomplete="off">
        <div class="sync-field-lbl">Gist ID <span style="font-weight:400;text-transform:none;letter-spacing:0;">(leave blank to create new)</span></div>
        <input class="sync-input" id="sync-gistid" type="text"
          placeholder="auto-generated on first save"
          value="${cfg.gistId}"
          autocomplete="off">
        <div class="sync-actions">
          ${isConfigured ? `
            <button class="sync-btn primary" onclick="gistPush()">↑ Push</button>
            <button class="sync-btn primary" onclick="gistPull()">↓ Pull</button>
            <button class="sync-btn secondary" onclick="saveGistSettings()">Save</button>
          ` : `
            <button class="sync-btn primary" onclick="gistCreate()">Create Gist & Save</button>
            <button class="sync-btn secondary" onclick="saveGistSettings()">Save token only</button>
          `}
        </div>
        <div style="display:flex;gap:8px;margin-top:8px;">
          <button class="sync-btn secondary" onclick="exportData()">⬇ Export JSON</button>
          <label class="sync-btn secondary" style="text-align:center;cursor:pointer;">
            ⬆ Import JSON
            <input type="file" accept=".json" style="display:none;" onchange="importData(event)">
          </label>
        </div>
        <div class="sync-hint">
          Token needs <b>gist</b> scope only. Create at
          <a href="https://github.com/settings/tokens/new?scopes=gist" target="_blank">github.com/settings/tokens</a>.
          Data is stored in a private Gist in your account — never shared.
        </div>
      </div>
    </div>
  `;
}

// ─────────────────────────────────────────────────────
// SPARKLINE SVG
// ─────────────────────────────────────────────────────
function sparkline(history, color) {
  const pts = history.slice(0, 10).reverse(); // oldest → newest, max 10
  if (pts.length < 1) return '';

  const W = 320, H = 72;
  const padL = 8, padR = 8, padT = 18, padB = 14;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;

  const vals = pts.map(p => p.e1rm);
  const min = Math.min(...vals);
  const max = Math.max(...vals);
  const range = max - min || 10; // avoid flat line being invisible

  // Expand range slightly so dots at extremes aren't clipped
  const minY = min - range * 0.15;
  const maxY = max + range * 0.15;
  const yRange = maxY - minY;

  function cx(i) {
    if (pts.length === 1) return padL + chartW / 2;
    return padL + (i / (pts.length - 1)) * chartW;
  }
  function cy(val) {
    return padT + (1 - (val - minY) / yRange) * chartH;
  }

  const coords = pts.map((p, i) => ({ x: cx(i), y: cy(p.e1rm), val: p.e1rm, weight: p.weight }));

  // Line path
  const linePath = coords.length > 1
    ? 'M ' + coords.map(c => `${c.x.toFixed(1)},${c.y.toFixed(1)}`).join(' L ')
    : '';

  // Gradient fill path (line + close to bottom)
  const fillPath = coords.length > 1
    ? linePath
      + ` L ${coords[coords.length-1].x.toFixed(1)},${(padT + chartH).toFixed(1)}`
      + ` L ${coords[0].x.toFixed(1)},${(padT + chartH).toFixed(1)} Z`
    : '';

  const gradId = 'g' + Math.random().toString(36).slice(2, 7);

  // Dots + weight labels
  const dotsAndLabels = coords.map((c, i) => {
    const isLast = i === coords.length - 1;
    const isMax = c.val === Math.max(...vals);
    const dotR = isLast ? 4 : 3;
    const dotFill = isLast ? color : (isMax ? color : 'var(--bg3)');
    const dotStroke = color;

    // Label: show weight (not e1RM) — more intuitive at a glance
    const label = c.weight + '';
    // Place label above dot, nudge edge labels inward
    let lx = c.x;
    if (i === 0) lx = Math.max(c.x, padL + 10);
    if (i === coords.length - 1) lx = Math.min(c.x, W - padR - 10);

    const labelY = c.y - 7;

    return `
      <circle cx="${c.x.toFixed(1)}" cy="${c.y.toFixed(1)}" r="${dotR}"
        fill="${dotFill}" stroke="${dotStroke}" stroke-width="1.5"/>
      <text x="${lx.toFixed(1)}" y="${labelY.toFixed(1)}"
        text-anchor="middle"
        font-size="8.5" font-family="Instrument Sans, sans-serif" font-weight="${isLast || isMax ? '700' : '500'}"
        fill="${isLast ? color : isMax ? color : 'var(--text3)'}">${label}</text>
    `;
  }).join('');

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;display:block;overflow:visible;" preserveAspectRatio="xMidYMid meet">
    <defs>
      <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
      </linearGradient>
    </defs>
    ${fillPath ? `<path d="${fillPath}" fill="url(#${gradId})"/>` : ''}
    ${linePath ? `<path d="${linePath}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>` : ''}
    ${dotsAndLabels}
  </svg>`;
}

// ─────────────────────────────────────────────────────
// GOAL ARC SVG
// ─────────────────────────────────────────────────────
function goalArcSvg(pct, color) {
  const R = 36, cx = 44, cy = 44;
  const startAngle = -200, endAngle = 20; // degrees, sweep = 220°
  const sweep = 220;
  const filled = (pct / 100) * sweep;

  function polar(angleDeg, r) {
    const rad = (angleDeg - 90) * Math.PI / 180;
    return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
  }

  function arcPath(startDeg, endDeg, r) {
    const s = polar(startDeg, r);
    const e = polar(endDeg, r);
    const large = (endDeg - startDeg) > 180 ? 1 : 0;
    return `M ${s.x.toFixed(2)} ${s.y.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${e.x.toFixed(2)} ${e.y.toFixed(2)}`;
  }

  const bgPath = arcPath(startAngle, startAngle + sweep, R);
  const fgPath = filled > 0.5 ? arcPath(startAngle, startAngle + filled, R) : '';

  return `<svg viewBox="0 0 88 52" width="88" height="52">
    <path d="${bgPath}" fill="none" stroke="var(--bg3)" stroke-width="7" stroke-linecap="round"/>
    ${fgPath ? `<path d="${fgPath}" fill="none" stroke="${color}" stroke-width="7" stroke-linecap="round"/>` : ''}
  </svg>`;
}

// ─────────────────────────────────────────────────────
// INLINE LIFT LOGGER HTML
// ─────────────────────────────────────────────────────
function inlineLiftHtml(trackId, color) {
  const cfg = TRACKABLE[trackId];
  if (!cfg) return '';
  const last = getLastEntry(trackId);
  const hist = getE1RMHistory(trackId);
  const pr1rm = getPR1RM(trackId);
  const reps = cfg.reps;
  const advice = getProgressionAdvice(trackId);

  const defW = last ? last.weight : '';
  const curE1rm = last ? epley(last.weight, reps) : null;
  const prChipVisible = curE1rm && curE1rm === pr1rm ? 'visible' : '';

  const recentChips = hist.slice(0, 5).map(h => {
    const d = new Date(h.date);
    const dateStr = d.toLocaleDateString('en-DK', { day:'numeric', month:'short' });
    const isPR = h.e1rm === pr1rm;
    return `<span class="ex-lift-chip ${isPR ? 'is-pr' : ''}">${h.weight}${cfg.unit} <span style="opacity:.5">${dateStr}</span></span>`;
  }).join('');

  const spark = sparkline(hist, color);

  // Coach card
  let coachHtml = '';
  if (advice.status === 'ok') {
    const urgencyColors = { push:'#7ED4A8', hold:color, deload:'#D47E7E', normal:color };
    const urgencyLabels = { push:'↑ Increase', hold:'Hold', deload:'↓ Reduce', normal:'Maintain' };
    const uc = urgencyColors[advice.urgency] || color;
    const ul = urgencyLabels[advice.urgency] || '';
    const trendLabels = { progressing:'↑ Progressing', stable:'→ Stable', declining:'↓ Declining' };
    const trendColors = { progressing:'#7ED4A8', stable:color, declining:'#D47E7E' };
    const tc = trendColors[advice.trend] || color;

    coachHtml = `
      <div class="coach-card">
        <div class="coach-icon">🎯</div>
        <div class="coach-body">
          <div class="coach-next">
            <span class="coach-next-lbl">Next session</span>
            <span class="coach-next-val" style="color:${uc};">${advice.nextWeight}${cfg.unit}</span>
            <span class="coach-trend-chip" style="background:${uc}20;color:${uc};">${ul}</span>
            <span class="coach-trend-chip" style="background:${tc}15;color:${tc};margin-left:auto;">${trendLabels[advice.trend]}</span>
          </div>
          <div class="coach-advice">${advice.advice}</div>
        </div>
      </div>`;
  } else {
    // No data yet — show a first-session prompt
    const workingPct = cfg.reps <= 4 ? 0.85 : cfg.reps <= 6 ? 0.82 : 0.78;
    const suggestedFromGoal = cfg.goal1rm
      ? Math.round((cfg.goal1rm * workingPct * 0.75) / 2.5) * 2.5
      : null;
    coachHtml = `
      <div class="coach-card">
        <div class="coach-icon">🎯</div>
        <div class="coach-body">
          <div class="coach-next">
            <span class="coach-next-lbl">First session</span>
            ${suggestedFromGoal ? `<span class="coach-next-val" style="color:${color};">${suggestedFromGoal}${cfg.unit}</span>` : ''}
            <span class="coach-trend-chip" style="background:${color}20;color:${color};">Start here</span>
          </div>
          <div class="coach-advice">No data logged yet. ${suggestedFromGoal ? `Try ${suggestedFromGoal}${cfg.unit} as a starting point — that's ~75% of your goal working weight. Log your set and coaching kicks in from the next session.` : `Log your first set to start tracking progress.`}</div>
        </div>
      </div>`;
  }

  return `
    <div class="ex-lift-wrap" id="lw-${trackId}">
      ${coachHtml}
      <div style="padding:10px 15px 0;">
        <div class="ex-lift-header">
          <div class="ex-lift-e1rm">
            e1RM: <span id="e1rm-${trackId}">${curE1rm ? curE1rm + ' kg' : '—'}</span>
            ${pr1rm ? `<span style="color:var(--text3);margin-left:4px;">/ PR ${pr1rm} kg</span>` : ''}
          </div>
          <span class="ex-lift-pr-chip ${prChipVisible}" id="pr-chip-${trackId}">PR</span>
        </div>
        <div class="ex-lift-inputs">
          <div class="ex-lift-field">
            <div class="ex-lift-lbl">Weight (${cfg.unit})</div>
            <input class="ex-lift-input" type="number" inputmode="decimal"
              id="lw-w-${trackId}" value="${defW}" placeholder="kg" step="2.5" min="0" max="500"
              oninput="updateE1rm('${trackId}')">
          </div>
          <div class="ex-lift-field" style="max-width:54px;opacity:.55;pointer-events:none;">
            <div class="ex-lift-lbl">Reps</div>
            <div class="ex-lift-input" style="display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;color:var(--text2);">${reps}</div>
          </div>
          <button class="ex-lift-btn" style="background:${color};color:#141414;"
            onclick="inlineLogLift('${trackId}','${color}')">Log</button>
        </div>
        <div class="ex-lift-history" id="lh-${trackId}">${recentChips}</div>
        <div class="ex-lift-chart" id="ls-${trackId}">${spark}</div>
      </div>
    </div>
  `;
}

function updateE1rm(trackId) {
  const w = parseFloat(document.getElementById('lw-w-' + trackId)?.value);
  const reps = TRACKABLE[trackId]?.reps || 1;
  const el = document.getElementById('e1rm-' + trackId);
  if (el && w > 0) {
    el.textContent = epley(w, reps) + ' kg';
  }
}

function inlineLogLift(trackId, color) {
  const cfg = TRACKABLE[trackId];
  const wEl = document.getElementById('lw-w-' + trackId);
  const w = parseFloat(wEl?.value);
  const r = cfg.reps;
  if (!w || w <= 0) { showToast('Enter a weight'); return; }

  const oldPR = getPR1RM(trackId);
  saveLiftEntry(trackId, w, r);
  const newPR = getPR1RM(trackId);
  const newE1rm = epley(w, r);

  if (newPR > (oldPR || 0)) {
    showToast('🏆 New e1RM PR — ' + newPR + ' kg');
  } else {
    showToast('Logged ' + w + cfg.unit + ' × ' + r + ' → e1RM ' + newE1rm + ' kg');
  }

  // Re-render the entire lift block so the coach card updates with fresh advice
  const wrap = document.getElementById('lw-' + trackId);
  if (wrap) {
    const newHtml = inlineLiftHtml(trackId, color);
    wrap.outerHTML = newHtml;
    // Restore the weight input value so user sees what they just logged
    const newWEl = document.getElementById('lw-w-' + trackId);
    if (newWEl) newWEl.value = w;
  }
}

// Returns best e1RM across one or more trackable IDs
function bestE1RM(...ids) {
  const prs = ids.map(id => getPR1RM(id)).filter(Boolean);
  return prs.length ? Math.max(...prs) : null;
}

  'Min 1 — Strict OHP':        { ids: ['ohp-wed','ohp-fri'], pctKey: true  },

  'Deadlift':                   { ids: ['deadlift'],          pctKey: true  },
  'Back Squats':                { ids: ['back-squat'],        pctKey: true  },
  'Min 1 — Power Clean + Jerk': { ids: ['deadlift'],          pct: 0.70     },
  'Clean & Jerk':               { ids: ['deadlift'],          pct: 0.65     },
  'Barbell Hip Thrusts':        { ids: ['rdl'],               pct: 0.80     },

  'Dumbbell Push Press':        { ids: ['ohp-wed','ohp-fri'], pct: 0.35     },
};

// Parse percentage from reps string like "10 @ 70%"
function parsePctFromReps(repsStr) {
  const m = repsStr.match(/(\d+)%/);
  return m ? parseInt(m[1]) / 100 : null;
}

function roundKg(val) { return Math.round(val / 2.5) * 2.5; }

function resolveHiitWeight(moveName, repsStr) {
  const src = HIIT_LIFT_SOURCE[moveName];
  if (!src) return null;

  const e1rm = bestE1RM(...src.ids);
  if (!e1rm) return null;

  const pct = src.pctKey
    ? (parsePctFromReps(repsStr) || src.pct)
    : src.pct;
  if (!pct) return null;

  const weight = roundKg(e1rm * pct);
  return weight > 0 ? weight : null;
}

function phaseHtml(ph, idx, color, dayIdx) {
  const rows = ph.items.map(ex => {
    const trackId = resolveTrackableId(ex.n, dayIdx);
    const logger = trackId ? inlineLiftHtml(trackId, color) : '';
    return `
      <div class="ex-row" style="${logger ? 'flex-direction:column;align-items:stretch;padding:0;' : ''}">
        ${logger ? `
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:13px 15px 10px;">
            <div class="ex-body">
              <div class="ex-name">${ex.n}</div>
              <div class="ex-desc">${ex.d}</div>
            </div>
            <div class="ex-sets" style="color:${color};">${ex.s}</div>
          </div>
          ${logger}
        ` : `
          <div class="ex-body">
            <div class="ex-name">${ex.n}</div>
            <div class="ex-desc">${ex.d}</div>
          </div>
          <div class="ex-sets" style="color:${color};">${ex.s}</div>
        `}
      </div>
    `;
  }).join('');
  return `
    <div class="phase">
      <div class="phase-head">
        <div class="phase-num" style="background:${color};">${idx}</div>
        <div class="phase-title">${ph.name}</div>
        <div class="phase-dur">${ph.dur}</div>
      </div>
      <div class="ex-table">${rows}</div>
    </div>
  `;
}

function hiitBlockHtml(d) {
  const col = d.color;
  const poolVar = d.hiitPool === 'UPPER' ? 'UPPER' : 'LOWER';
  const id = d.hiitPool.toLowerCase();
  const dur = d.hiitPool === 'UPPER' ? '25–30 min' : '22–27 min';
  const chips = d.constraints.map(c =>
    `<span class="constraint-chip" style="color:${col};border-color:${col}40;background:${col}10;">${c}</span>`
  ).join('');

  return `
    <div class="hiit-wrap">
      <div class="phase-head">
        <div class="phase-num" style="background:${col};">2</div>
        <div class="phase-title">HIIT — Your Choice</div>
        <div class="phase-dur">${dur}</div>
      </div>
      <div class="hiit-card" style="border-color:${col}35;">
        <div class="hiit-card-head" style="background:${col}10;">
          <span class="hiit-badge" style="background:${col}22;color:${col};">HIIT · ${d.hiitPool}</span>
          <span class="hiit-card-name">${d.hiitPool === 'UPPER' ? 'Upper Body Metabolic' : 'Lower Body + Posterior'}</span>
        </div>
        <div class="hiit-goal-block">
          <div class="hiit-goal-lbl">Goal</div>

            <span id="gicon-${id}">⚡</span> Generate
          </button>
          <span class="gen-hint">Tap to get a random workout matching these constraints</span>
        </div>

function genWorkout(id, poolName, color) {
  const pool = poolName === 'UPPER' ? UPPER : LOWER;
  const icon = document.getElementById('gicon-' + id);
  icon.classList.remove('spinning');
  void icon.offsetWidth;
  icon.classList.add('spinning');

  const w = pick(pool);
  const tagsHtml = w.tags.map(t =>
    `<span class="wo-tag" style="color:${color};border-color:${color}40;background:${color}12;">${t}</span>`
  ).join('');
  const movesHtml = w.moves.map((m, i) => {
    const suggestedKg = resolveHiitWeight(m.name, m.reps);
    const weightBadge = suggestedKg
      ? `<span style="font-size:10px;font-weight:700;color:${color};background:${color}18;border:1px solid ${color}35;padding:2px 8px;border-radius:5px;margin-left:6px;white-space:nowrap;">→ ${suggestedKg} kg</span>`
      : '';
    return `
    <div class="wo-move-row">
      <div class="wo-move-num">${String(i+1).padStart(2,'0')}</div>
      <div class="wo-move-body">
        <div class="wo-move-name" style="display:flex;align-items:center;flex-wrap:wrap;gap:4px;">${m.name}${weightBadge}</div>
        ${m.detail ? `<div class="wo-move-desc">${m.detail}</div>` : ''}
      </div>
      <span class="wo-move-reps" style="color:${color};background:${color}15;border:1px solid ${color}30;">${m.reps}</span>
    </div>
  `}).join('');
  const notesHtml = w.notes.map(n => `
    <div class="wo-note">
      <div class="wo-note-dot" style="background:${color};"></div>
      <span>${n}</span>
    </div>
  `).join('');

  document.getElementById('wo-out-' + id).innerHTML = `
    <div class="wo-out-header" style="background:${color}08;">
      <div class="wo-tags">
        <span class="wo-tag" style="color:${color};border-color:${color}40;background:${color}12;">${w.format}</span>
        <span class="wo-tag" style="color:var(--text3);border-color:var(--bord2);background:var(--bg3);">${w.duration}</span>
      </div>
      <div class="wo-title">${w.title}</div>
      <div class="wo-tagline">${w.tagline}</div>
      <div class="wo-meta-pills">${tagsHtml}</div>
    </div>
    <div class="wo-structure">
      <div class="wo-structure-lbl">Workout</div>
      <div class="wo-moves">${movesHtml}</div>
    </div>
    <div class="wo-notes-block">
      <div class="wo-notes-lbl">Coaching Notes</div>
      ${notesHtml}
    </div>
  `;
}

function switchTrackerTab(tab) {
  trackerTab = tab;
  document.querySelectorAll('.tracker-tab').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.toLowerCase() === tab);
  });
  renderTrackerPanel();
}

function renderTrackerPanel() {
  const container = document.getElementById('tracker-content');
  if (!container) return;
  if (trackerTab === 'sessions') container.innerHTML = renderSessionsPanel();
  else container.innerHTML = renderStatsPanel();
}

// ── STATS PANEL ──
function renderStatsPanel() {
  const sessions = getSessionLog();
  const weekCount = getWeeklyCount();
  const totalCount = sessions.length;

  const withHRV = sessions.filter(s => s.hrv);
  const withRHR = sessions.filter(s => s.rhr);
  const latestHRV = withHRV.length ? withHRV[0].hrv : '—';
  const latestRHR = withRHR.length ? withRHR[0].rhr : '—';
  const now = new Date();
  const week = new Date(now - 7*24*60*60*1000);
  const recentHRV = sessions.filter(s => new Date(s.date) >= week && s.hrv).map(s => parseFloat(s.hrv));
  const avgHRV = recentHRV.length ? Math.round(recentHRV.reduce((a,b)=>a+b,0)/recentHRV.length) : null;

  // ── Goal arcs for all tracked lifts ──
  const goalLifts = Object.entries(TRACKABLE).filter(([id, cfg]) => cfg.goal1rm);
  const goalArcsHtml = goalLifts.map(([id, cfg]) => {
    const pr = getPR1RM(id);
    const adv = getProgressionAdvice(id);
    if (!pr) {
      return `
        <div class="goal-arc-card">
          <div class="goal-arc-wrap">
            ${goalArcSvg(0, '#7EB8D4')}
            <div class="goal-arc-label">
              <div class="goal-arc-pct" style="color:var(--text3);">—</div>
            </div>
          </div>
          <div class="goal-arc-name">${cfg.name}</div>
          <div class="goal-arc-meta">Goal ${cfg.goal1rm}${cfg.unit}<br>No data yet</div>
        </div>`;
    }
    const pct = adv.goalInfo.pctOfGoal;
    const gap = adv.goalInfo.gap;
    const weeks = adv.goalInfo.weeksToGoal;
    const color = pct >= 95 ? '#7ED4A8' : pct >= 75 ? '#D4A96A' : '#7EB8D4';
    return `
      <div class="goal-arc-card">
        <div class="goal-arc-wrap">
          ${goalArcSvg(pct, color)}
          <div class="goal-arc-label">
            <div class="goal-arc-pct" style="color:${color};">${pct}%</div>
          </div>
        </div>
        <div class="goal-arc-name">${cfg.name}</div>
        <div class="goal-arc-meta">
          ${pr}kg / ${cfg.goal1rm}${cfg.unit}<br>
          ${gap > 0 ? `${gap}kg to go · ~${weeks}w` : '🏆 Goal reached'}
        </div>
      </div>`;
  }).join('');

  // ── All lifts trend summary ──
  const liftRows = Object.entries(TRACKABLE).map(([id, cfg]) => {
    const hist = getE1RMHistory(id);
    const pr = getPR1RM(id);
    if (!pr) return null;
    const adv = getProgressionAdvice(id);
    const trendColors = { progressing:'#7ED4A8', stable:'#D4A96A', declining:'#D47E7E' };
    const trendLabels = { progressing:'↑', stable:'→', declining:'↓' };
    const tc = trendColors[adv.trend] || '#7EB8D4';
    const tl = trendLabels[adv.trend] || '—';
    const spark = sparkline(hist, '#7EB8D4');
    return `
      <div style="margin-bottom:14px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
          <span style="font-size:12px;font-weight:600;color:var(--text);">${cfg.name}</span>
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:10px;font-weight:700;color:${tc};">${tl} ${adv.trend}</span>
            <span style="font-size:11px;font-weight:700;color:#7EB8D4;">e1RM ${pr} kg</span>
          </div>
        </div>
        <div style="height:72px;">${spark}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:3px;">
          Next: <span style="font-weight:700;color:var(--text);">${adv.nextWeight}${cfg.unit}</span>
          <span style="margin-left:6px;opacity:.6;">${adv.advice.split('—')[0].trim()}</span>
        </div>
      </div>`;
  }).filter(Boolean).join('');

  const hvrvHtml = withHRV.slice(0, 10).map(s => {
    const hrv = parseFloat(s.hrv);
    const pct = Math.min(100, Math.round((hrv / 130) * 100));
    const d = new Date(s.date);
    const dateStr = d.toLocaleDateString('en-DK', { day:'numeric', month:'short' });
    return `
      <div class="progress-bar-row" style="gap:8px;">
        <span style="font-size:10px;color:var(--text3);width:48px;flex-shrink:0;">${dateStr}</span>
        <div class="progress-bar-bg" style="flex:1;"><div class="progress-bar-fill" style="width:${pct}%;background:${hrv >= 110 ? '#7ED4A8' : hrv >= 95 ? '#D4A96A' : '#D47E7E'};"></div></div>
        <span style="font-size:10px;font-weight:700;color:var(--text);min-width:40px;text-align:right;">${hrv} ms</span>
      </div>`;
  }).join('') || `<div style="font-size:12px;color:var(--text3);font-style:italic;">Log sessions with HRV data to see trends</div>`;

  return `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val">${weekCount}</div><div class="stat-lbl">This Week</div><div class="stat-sub">Sessions</div></div>
      <div class="stat-card"><div class="stat-val">${totalCount}</div><div class="stat-lbl">Total</div><div class="stat-sub">All time</div></div>
      <div class="stat-card"><div class="stat-val" style="color:${avgHRV && avgHRV >= 110 ? '#7ED4A8' : avgHRV ? '#D4A96A' : 'var(--text2)'};">${avgHRV || latestHRV}</div><div class="stat-lbl">HRV</div><div class="stat-sub">${avgHRV ? '7-day avg' : 'Latest'} · target 115–125</div></div>
      <div class="stat-card"><div class="stat-val">${latestRHR}</div><div class="stat-lbl">RHR</div><div class="stat-sub">Latest · target 40–44</div></div>
    </div>

    ${goalArcsHtml ? `
    <div class="tracker-section">
      <div class="tracker-section-head"><div class="tracker-section-title">1RM Goals</div></div>
      <div style="font-size:10px;color:var(--text3);margin-bottom:10px;line-height:1.5;">
        Based on bodyweight ratios linked to longevity and functional independence at 80kg. Not powerlifting targets — thresholds where the evidence shows meaningful mortality and healthspan benefit.
      </div>
      <div class="goal-arc-grid">${goalArcsHtml}</div>
    </div>` : ''}

    ${liftRows ? `
    <div class="tracker-section">
      <div class="tracker-section-head"><div class="tracker-section-title">All Lifts — Trends & Coaching</div></div>
      <div class="p-card">${liftRows}</div>
    </div>` : ''}

    <div class="tracker-section">
      <div class="tracker-section-head"><div class="tracker-section-title">HRV Trend (target: 115–125 ms)</div></div>
      <div class="p-card"><div class="progress-bar-wrap" style="display:flex;flex-direction:column;gap:6px;">${hvrvHtml}</div></div>
    </div>
  `;
}

// ── SESSIONS PANEL ──
function renderSessionsPanel() {
  const dayLabels = ['MON','TUE','WED','THU','FRI','SAT','SUN'];
  const optionsHtml = dayLabels.map((d,i) => `<option value="${i}">${d}</option>`).join('');
  const sessions = getSessionLog();

  const sessionsHtml = sessions.length === 0
    ? `<div style="padding:20px 15px;text-align:center;font-size:12px;color:var(--text3);font-style:italic;">No sessions logged yet</div>`
    : sessions.slice(0, 40).map(s => {
        const d = new Date(s.date);
        const dateStr = d.toLocaleDateString('en-DK', { weekday:'short', day:'numeric', month:'short' });
        const dayColor = DAYS[s.dayIndex]?.color || '#888';
        const metricsHtml = [
          s.hrv && `HRV ${s.hrv} ms`,
          s.rhr && `RHR ${s.rhr} bpm`,
          s.duration && `${s.duration} min`,
          s.feeling && `RPE ${s.feeling}/5`
        ].filter(Boolean).map(m => `<span class="session-metric">${m}</span>`).join('');
        return `
          <div class="session-entry">
            <div class="session-entry-day" style="color:${dayColor};">${dayLabels[s.dayIndex]||'—'}</div>
            <div class="session-entry-body">
              <div class="session-entry-date">${dateStr}</div>
              ${metricsHtml ? `<div class="session-entry-metrics">${metricsHtml}</div>` : ''}
              ${s.notes ? `<div class="session-entry-notes">${s.notes}</div>` : ''}
            </div>
            <button class="session-entry-del" onclick="deleteSessionEntry(${s.id})">✕</button>
          </div>`;
      }).join('');

  return `
    <div class="tracker-section">
      <div class="tracker-section-head"><div class="tracker-section-title">Log Session</div></div>
      <div class="session-log-card">
        <div class="session-form-inner">
          <div class="session-row">
            <div class="session-input-group half"><div class="session-label">Day</div><select class="session-input" id="sess-day">${optionsHtml}</select></div>
            <div class="session-input-group half"><div class="session-label">Duration (min)</div><input class="session-input" type="number" inputmode="numeric" id="sess-dur" placeholder="60" min="10" max="300"></div>
          </div>
          <div class="session-row">
            <div class="session-input-group third"><div class="session-label">HRV (ms)</div><input class="session-input" type="number" inputmode="numeric" id="sess-hrv" placeholder="102" min="0" max="250"></div>
            <div class="session-input-group third"><div class="session-label">RHR (bpm)</div><input class="session-input" type="number" inputmode="numeric" id="sess-rhr" placeholder="43" min="20" max="120"></div>
            <div class="session-input-group third"><div class="session-label">RPE (1–5)</div><input class="session-input" type="number" inputmode="numeric" id="sess-feel" placeholder="3" min="1" max="5"></div>
          </div>
          <div class="session-row">
            <div class="session-input-group full"><div class="session-label">Notes</div><input class="session-input" type="text" id="sess-notes" placeholder="Felt strong, new deadlift PR..."></div>
          </div>
          <button class="session-save-btn" onclick="logSession()">Save Session</button>
        </div>
        <div class="session-entries">${sessionsHtml}</div>
      </div>
    </div>
  `;
}

function logSession() {
  const dayIndex = parseInt(document.getElementById('sess-day').value);
  const duration = document.getElementById('sess-dur').value;
  const hrv = document.getElementById('sess-hrv').value;
  const rhr = document.getElementById('sess-rhr').value;
  const feeling = document.getElementById('sess-feel').value;
  const notes = document.getElementById('sess-notes').value.trim();
  saveSession({ dayIndex, duration:duration||null, hrv:hrv||null, rhr:rhr||null, feeling:feeling||null, notes:notes||null });
  showToast('Session logged ✓');
  renderTrackerPanel();
}

function deleteSessionEntry(id) {
  deleteSession(id);
  showToast('Session removed');
  renderTrackerPanel();
}

function getTotalSessions() { return getSessionLog().length; }

function renderDay() {
  const d = DAYS[cur];
  const col = d.color;
  document.documentElement.style.setProperty('--c', col);
  document.getElementById('topbar-title').textContent = d.label + ' · ' + d.theme;
  document.getElementById('topbar-title').style.color = col;

  const typeStyle = d.type === 'OUTDOOR'
    ? `color:#7ED490;border-color:#7ED49040;background:#7ED49012;`
    : `color:${col};border-color:${col}40;background:${col}12;`;
  document.getElementById('topbar-right').innerHTML = `
    <span class="pill" style="${typeStyle}">${d.type}</span>
    <span class="pill" style="color:${col};border-color:${col}40;background:${col}12;">${d.duration}</span>
  `;

  let html = `<div class="content">
    <div class="hero">
      <div class="day-name">${d.label}</div>
      <div class="day-theme">${d.theme}</div>
      <div class="source-tag"><b>Johnson</b> ${d.bj}</div>
    </div>
    <div class="adapt">
      <div class="adapt-icon">⚡</div>
      <div>
        <div class="adapt-lbl">Advanced Adaptation</div>
        <div class="adapt-txt">${d.adapt}</div>
      </div>
    </div>`;

  if (d.isHiit) {
    html += phaseHtml(d.warmup, 1, col, cur);
    html += hiitBlockHtml(d);
    html += phaseHtml(d.z2, 3, col, cur);
  } else {
    d.phases.forEach((ph, i) => { html += phaseHtml(ph, i + 1, col, cur); });
  }

  html += `
    <div class="purpose" style="background:${col}0C;border-color:${col}28;">
      <div class="purpose-lbl" style="color:${col};">Purpose</div>
      <div class="purpose-txt">${d.purpose}</div>
    </div>
  </div>`;

  document.getElementById('main-view').innerHTML = renderSyncBanner() + html;
  document.getElementById('scroll-area').scrollTop = 0;
}

// ─────────────────────────────────────────────────────
// TAB BAR
// ─────────────────────────────────────────────────────

function renderTabBar() {
  const tabs = DAYS.map((d, i) => {
    const active = viewMode === 'day' && i === cur;
    return `
      <button class="tab-btn ${active ? 'active' : ''}" onclick="selDay(${i})">
        <div class="tab-active-bg" style="background:${d.color};"></div>
        <span class="tab-icon">${d.icon}</span>
        <span class="tab-label">${d.day}</span>
      </button>
    `;
  }).join('');

  const notesActive = viewMode === 'notes';
  const trackerActive = viewMode === 'tracker';

  document.getElementById('tab-bar').innerHTML = tabs + `
    <button class="tab-btn ${notesActive ? 'active' : ''}" onclick="selNotes()">
      <div class="tab-active-bg" style="background:#888;"></div>
      <span class="tab-icon">📋</span>
      <span class="tab-label">Notes</span>
    </button>
    <button class="tab-btn ${trackerActive ? 'active' : ''}" onclick="selTracker()">
      <div class="tab-active-bg" style="background:#7EB8D4;"></div>
      <span class="tab-icon">📊</span>
      <span class="tab-label">Stats</span>
    </button>
  `;
}

function selDay(i) {
  cur = i; viewMode = 'day';
  renderDay(); renderTabBar();
}

function selNotes() {
  viewMode = 'notes';
  renderNotes(); renderTabBar();
}

function selTracker() {
  viewMode = 'tracker';
  renderTracker(); renderTabBar();
}

// ─────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────

const dayMap = {1:0, 2:1, 3:2, 4:3, 5:4, 6:5, 0:6};
cur = dayMap[new Date().getDay()] ?? 0;
migrateOldKeys();
renderDay();
renderTabBar();
</script>
</body>
